<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Meetang - Smart Tracker</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f97316">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap');

    :root {
      --primary: #f97316;
      --primary-light: #fff7ed;
    }

    body {
      font-family: 'Kanit', sans-serif;
      -webkit-tap-highlight-color: transparent;
      background-color: #f8fafc;
      color: #0f172a;
    }

    .text-theme-primary {
      color: var(--primary);
    }

    .bg-theme-primary {
      background-color: var(--primary);
    }

    .border-theme-primary {
      border-color: var(--primary);
    }

    .tab-active {
      color: var(--primary);
      transform: scale(1.05);
      transition: all 0.3s;
    }

    .tab-inactive {
      color: #94a3b8;
    }

    .card-gradient {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    }

    .weather-gradient {
      background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
    }

    .ai-gradient {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    }

    .gold-gradient {
      background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
    }

    /* Custom Dime-like Style from Benz */
    .dime-gradient {
      background: linear-gradient(180deg, #2bb0ff 0%, #0077d6 100%);
    }

    .safe-pb {
      padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 100px);
    }

    .bottom-sheet {
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-btn:active {
      transform: scale(0.9);
    }

    #save-banner {
      transition: all 0.3s ease;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
    }

    #save-banner.visible {
      max-height: 40px;
      opacity: 1;
      margin-top: 8px;
      padding: 4px 16px;
    }

    .shimmer {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }
  </style>
</head>

<body class="min-h-screen relative">

  <header
    class="bg-white/90 backdrop-blur-md px-6 py-4 sticky top-0 z-40 flex flex-col shadow-sm border-b border-slate-100">
    <div class="flex justify-between items-center w-full">
      <div class="flex items-center gap-3">
        <button class="logo-btn transition-transform outline-none">
          <div
            class="w-10 h-10 bg-theme-primary rounded-2xl flex items-center justify-center text-white shadow-lg shadow-orange-200">
            <i class="fa-solid fa-cat text-xl"></i></div>
        </button>
        <div class="flex flex-col">
          <h1 class="text-lg font-black text-slate-800 leading-none tracking-tight">MEETANG</h1>
          <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Smart Tracker 🔒</p>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <button onclick="showSettingsMenu()"
          class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:text-theme-primary transition-colors"><i
            class="fa-solid fa-gear text-sm"></i></button>
        <button onclick="showNotifs()"
          class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 relative hover:text-theme-primary transition-all">
          <i class="fa-solid fa-bell text-sm"></i>
          <div id="notif-dot"
            class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full hidden border-2 border-white"></div>
        </button>
      </div>
    </div>
    <div id="save-banner"
      class="flex items-center justify-center gap-2 bg-emerald-50 rounded-full mx-auto border border-emerald-100">
      <span id="save-icon-box"><i class="fa-solid fa-check text-[10px] text-emerald-500"></i></span>
      <span id="save-msg"
        class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">บันทึกลงเครื่องเรียบร้อย</span>
    </div>
  </header>

  <main class="p-5 max-w-md mx-auto w-full safe-pb" id="view-container">
    <div class="flex flex-col items-center justify-center py-40">
      <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-theme-primary"></i>
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest animate-pulse">กำลังโหลดข้อมูล...</p>
    </div>
  </main>

  <div id="modal-overlay" onclick="if(event.target.id === 'modal-overlay') closeModal()"
    class="fixed inset-0 bg-slate-900/60 z-50 hidden flex flex-col justify-end backdrop-blur-sm">
    <div
      class="bg-white w-full max-w-md mx-auto rounded-t-[2.5rem] p-6 bottom-sheet shadow-2xl relative max-h-[85vh] overflow-y-auto">
      <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6" onclick="closeModal()"></div>
      <div id="modal-content"></div>
    </div>
  </div>

  <nav
    class="fixed bottom-5 left-5 right-5 h-[72px] bg-white border border-slate-100 rounded-3xl shadow-xl shadow-slate-200/50 flex justify-around items-center px-1 z-40 max-w-md mx-auto">
    <button onclick="switchTab('home')" id="tab-home"
      class="flex flex-col items-center justify-center w-full h-full space-y-1.5 text-slate-400"><i
        class="fa-solid fa-house text-[18px]"></i><span
        class="text-[8px] font-bold uppercase tracking-wider">หน้าหลัก</span></button>
    <button onclick="switchTab('cards')" id="tab-cards"
      class="flex flex-col items-center justify-center w-full h-full space-y-1.5 text-slate-400"><i
        class="fa-solid fa-credit-card text-[18px]"></i><span
        class="text-[8px] font-bold uppercase tracking-wider">บัตร</span></button>
    <button onclick="switchTab('installments')" id="tab-installments"
      class="flex flex-col items-center justify-center w-full h-full space-y-1.5 text-slate-400"><i
        class="fa-solid fa-calendar-check text-[18px]"></i><span
        class="text-[8px] font-bold uppercase tracking-wider">ผ่อน</span></button>
    <button onclick="switchTab('invest')" id="tab-invest"
      class="flex flex-col items-center justify-center w-full h-full space-y-1.5 text-slate-400"><i
        class="fa-solid fa-arrow-trend-up text-[18px]"></i><span
        class="text-[8px] font-bold uppercase tracking-wider">ลงทุน</span></button>
    <button onclick="switchTab('summary')" id="tab-summary"
      class="flex flex-col items-center justify-center w-full h-full space-y-1.5 text-slate-400"><i
        class="fa-solid fa-chart-pie text-[18px]"></i><span
        class="text-[8px] font-bold uppercase tracking-wider">วิเคราะห์</span></button>
  </nav>

  <input type="file" id="importFile" class="hidden" accept=".txt,.json,.zip" onchange="importData(event)">

  <script>
    const apiKey = "";

    async function fetchGeminiAPI(prompt, expectJson = false) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: "You are 'Kae' (เก๋), a friendly, expert Thai financial advisor assistant inside an app named Meetang. Reply briefly and naturally in Thai. Use emojis to make it engaging. Call the user 'เบนซ์' (Benz). Absolutely NO health, medical, or supplement advice." }] }
      };
      if (expectJson) payload.generationConfig = { responseMimeType: "application/json" };
      try {
        const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        if (!response.ok) throw new Error();
        const result = await response.json();
        return expectJson ? JSON.parse(result.candidates[0].content.parts[0].text) : result.candidates[0].content.parts[0].text;
      } catch (error) { return null; }
    }

    let state = {
      cards: [], installments: [], gold: [], stocks: [], marketPrices: {},
      tab: 'home', investSubTab: 'stocks', theme: { color: '#f97316' },
      weather: { temp: '--', condition: 'กำลังโหลด...', pm25: '--', location: 'พิกัดปัจจุบัน' },
      settings: { enableNotif: true, usdRate: 36.5 }, lastBackup: ''
    };

    const DB_KEY = 'MEETANG_OFFLINE_V8';
    let chartInstance, saveTimeout;

    const toCurr = (v, currency = 'THB') => {
      const sym = currency === 'USD' ? '$' : (currency === '' ? '' : '');
      return sym + Number(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    function formatThaiMonth(ym) {
      const m = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
      const [y, mm] = ym.split('-');
      return `${m[parseInt(mm) - 1]} ${y}`;
    }

    function shiftMonthStr(ym, n) {
      const [y, m] = ym.split('-').map(Number);
      const d = new Date(y, m - 1 + n, 1);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }

    function run() {
      let local = localStorage.getItem(DB_KEY) || localStorage.getItem('MEETANG_OFFLINE_V7') || localStorage.getItem('MEETANG_OFFLINE_V6');
      if (local) {
        try {
          const parsed = JSON.parse(local);
          state.cards = parsed.cards || [];
          state.installments = parsed.installments || [];
          state.gold = parsed.gold || [];
          state.stocks = parsed.stocks || [];
          state.marketPrices = parsed.marketPrices || {};
          if (parsed.theme) state.theme = parsed.theme;
          if (parsed.settings !== undefined) {
            state.settings = parsed.settings;
            if (!state.settings.usdRate) state.settings.usdRate = 36.5;
          }
          if (parsed.lastBackup !== undefined) state.lastBackup = parsed.lastBackup;
          applyTheme(state.theme.color);
        } catch (e) { console.error(e); }
      }
      fetchWeather(); renderViewport();
    }

    function forceSave() {
      localStorage.setItem(DB_KEY, JSON.stringify({
        cards: state.cards, installments: state.installments, gold: state.gold, stocks: state.stocks, marketPrices: state.marketPrices,
        theme: state.theme, settings: state.settings, lastBackup: state.lastBackup
      }));
      showSaveBanner();
    }

    function showSaveBanner() {
      const banner = document.getElementById('save-banner');
      banner.classList.add('visible');
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => { banner.classList.remove('visible'); }, 2000);
    }

    window.clearAllData = () => {
      if (confirm("⚠️ คำเตือน: คุณเบนซ์แน่ใจนะคะว่าจะล้างข้อมูลทั้งหมด? ข้อมูลบัตร, ผ่อน, และการลงทุนจะหายไปหมดเลยนะคะ! (แนะนำให้ Backup ไว้ก่อนค่ะ)")) {
        if (confirm("ยืนยันการลบข้อมูลทั้งหมดจริงๆ นะคะ? (ลบแล้วกู้คืนไม่ได้นอกจากจะโหลดไฟล์ Backup ค่ะ)")) {
          state.cards = []; state.installments = []; state.gold = []; state.stocks = []; state.marketPrices = {}; state.lastBackup = '';
          forceSave(); closeModal(); renderViewport();
          alert("เก๋เคลียร์ข้อมูลทั้งหมดให้เรียบร้อยแล้วค่ะ เริ่มต้นใหม่ได้เลย! ✨");
        }
      }
    };

    function arrayToCSV(arr) {
      if (arr.length === 0) return '';
      const keys = Object.keys(arr[0]);
      const header = keys.join(',');
      const rows = arr.map(obj => keys.map(k => `"${(obj[k] || '').toString().replace(/"/g, '""')}"`).join(','));
      return [header, ...rows].join('\n');
    }

    window.exportData = async () => {
      if (typeof JSZip === 'undefined') return alert('ระบบกำลังโหลดตัวบีบอัดไฟล์ กรุณารอสักครู่ค่ะ');
      const zip = new JSZip();
      const rawData = { cards: state.cards, installments: state.installments, gold: state.gold, stocks: state.stocks, marketPrices: state.marketPrices, theme: state.theme, settings: state.settings, lastBackup: state.lastBackup };
      zip.file("meetang_system_data.json", JSON.stringify(rawData, null, 2));

      const csvFolder = zip.folder("excel_files");
      if (state.cards.length > 0) csvFolder.file("cards.csv", "\ufeff" + arrayToCSV(state.cards));
      if (state.installments.length > 0) csvFolder.file("installments.csv", "\ufeff" + arrayToCSV(state.installments));
      if (state.gold.length > 0) csvFolder.file("gold.csv", "\ufeff" + arrayToCSV(state.gold));
      if (state.stocks.length > 0) csvFolder.file("stocks.csv", "\ufeff" + arrayToCSV(state.stocks));

      const content = await zip.generateAsync({ type: "blob" });
      const url = URL.createObjectURL(content);
      const a = document.createElement("a");
      a.href = url;
      a.download = `meetang_backup_${new Date().toISOString().slice(0, 10)}.zip`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);

      state.lastBackup = 'เซฟ Zip เมื่อ ' + new Date().toLocaleString('th-TH', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
      forceSave(); if (state.tab === 'home') renderViewport();
    };

    window.importData = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const ext = file.name.split('.').pop().toLowerCase();

      if (ext === 'zip') {
        if (typeof JSZip === 'undefined') return alert('โหลดไลบรารีไม่สำเร็จ กรุณาต่อเน็ตแล้วลองใหม่ค่ะ');
        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const zip = await JSZip.loadAsync(evt.target.result);
            if (!zip.file("meetang_system_data.json")) return alert("ไม่พบไฟล์ JSON ค่ะ");
            const jsonStr = await zip.file("meetang_system_data.json").async("string");
            restoreFromJson(jsonStr);
          } catch (err) { alert("เกิดข้อผิดพลาดในการแตกไฟล์ Zip ค่ะ"); }
        };
        reader.readAsArrayBuffer(file);
      } else {
        const reader = new FileReader();
        reader.onload = (evt) => { restoreFromJson(evt.target.result); };
        reader.readAsText(file);
      }
      e.target.value = '';
    };

    function restoreFromJson(jsonString) {
      try {
        const parsed = JSON.parse(jsonString);
        if (parsed.cards !== undefined) {
          state.cards = parsed.cards || []; state.installments = parsed.installments || [];
          state.gold = parsed.gold || []; state.stocks = parsed.stocks || []; state.marketPrices = parsed.marketPrices || {};
          if (parsed.theme) state.theme = parsed.theme;
          if (parsed.settings !== undefined) { state.settings = parsed.settings; if (!state.settings.usdRate) state.settings.usdRate = 36.5; }
          state.lastBackup = 'โหลดเมื่อ ' + new Date().toLocaleString('th-TH', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
          forceSave(); applyTheme(state.theme.color); renderViewport(); closeModal();
          alert("กู้คืนข้อมูลสำเร็จแล้วค่ะ!");
        } else { alert("ไฟล์ไม่ถูกต้อง หรือข้อมูลไม่ครบถ้วนค่ะ"); }
      } catch (err) { alert("เกิดข้อผิดพลาดในการอ่านข้อมูลค่ะ"); }
    }

    function fetchWeather() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (pos) => {
          const { latitude, longitude } = pos.coords;
          try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&air_quality=pm2_5`);
            const data = await res.json();
            const pmRes = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${latitude}&longitude=${longitude}&current=pm2_5`);
            const pmData = await pmRes.json();

            state.weather = {
              temp: data.current.temperature_2m.toFixed(1),
              condition: getWeatherCodeDesc(data.current.weather_code),
              pm25: pmData.current.pm2_5.toFixed(0),
              location: 'พิกัดปัจจุบันของคุณ'
            };
            if (state.tab === 'home') renderViewport();
          } catch (e) { console.error('Weather error', e); }
        }, (err) => {
          console.warn("Location denied");
          state.weather.condition = "ระบุพิกัดไม่ได้";
          if (state.tab === 'home') renderViewport();
        });
      }
    }

    function getWeatherCodeDesc(code) { return code <= 3 ? 'มีเมฆบางส่วน' : 'อากาศเปลี่ยนแปลง'; }
    function getPMColor(val) { return 'text-emerald-400'; }

    function applyTheme(c) { document.documentElement.style.setProperty('--primary', c); state.theme.color = c; }

    window.switchTab = (t) => {
      state.tab = t;
      ['home', 'cards', 'installments', 'invest', 'summary'].forEach(item => {
        const b = document.getElementById(`tab-${item}`);
        if (b) { if (t === item) { b.classList.add('tab-active'); b.classList.remove('tab-inactive'); } else { b.classList.remove('tab-active'); b.classList.add('tab-inactive'); } }
      });
      renderViewport();
    };

    window.switchInvestSubTab = (subTab) => { state.investSubTab = subTab; renderViewport(); };

    function renderViewport() {
      const container = document.getElementById('view-container');
      if (!container) return;
      updateNotifs(); container.innerHTML = '';
      if (state.tab === 'home') renderHome(container);
      else if (state.tab === 'cards') renderCards(container);
      else if (state.tab === 'installments') renderInstallments(container);
      else if (state.tab === 'invest') renderInvest(container);
      else if (state.tab === 'summary') renderSummary(container);
    }

    function renderHome(container) {
      const today = new Date(); const thisYm = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
      const currentMonthTotal = state.installments.reduce((sum, item) => {
        const start = item.startMonth; const end = shiftMonthStr(item.startMonth, item.dur - 1);
        if (thisYm >= start && thisYm <= end) return sum + item.amount; return sum;
      }, 0);

      let alertCardHtml = '';
      if (state.settings.enableNotif) {
        const day = today.getDate();
        const urgentCards = state.cards.filter(c => { const diff = c.date - day; return diff >= 0 && diff <= 3; });
        const alertText = urgentCards.length > 0 ? `บัตร ${urgentCards[0].name}` : 'ยังไม่มีดิวใกล้ชำระ';
        const alertColor = urgentCards.length > 0 ? 'rose' : 'emerald';
        alertCardHtml = `
            <div class="bg-${alertColor}-50 p-4 rounded-3xl border border-${alertColor}-100/50 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-${alertColor}-500 shadow-sm"><i class="fa-solid ${urgentCards.length > 0 ? 'fa-clock' : 'fa-check-circle'} text-lg"></i></div>
                    <div>
                        <p class="text-[9px] font-bold text-${alertColor}-600/80 uppercase tracking-widest mb-0.5">บัตรใกล้ตัดรอบ</p>
                        <p class="text-sm font-bold text-slate-800">${alertText}</p>
                    </div>
                </div>
            </div>`;
      } else {
        alertCardHtml = `<div class="bg-slate-50 p-4 rounded-3xl border border-slate-100/50 flex items-center gap-3"><div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-slate-400 shadow-sm"><i class="fa-solid fa-bell-slash text-lg"></i></div><div><p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-0.5">แจ้งเตือน</p><p class="text-sm font-bold text-slate-400">ปิดการเตือน</p></div></div>`;
      }

      container.innerHTML = `
                <div class="space-y-5 fade-in">
                    <div class="px-2 pt-2">
                        <h2 class="text-2xl font-black text-slate-800 tracking-tight">มีตัง ยินดีต้อนรับผู้ใช้งาน ค่ะ ✨</h2>
                        <p class="text-xs font-bold text-slate-500 mt-1">พร้อมจัดการการเงินของวันนี้หรือยังคะ?</p>
                    </div>

                    <div class="weather-gradient p-6 rounded-3xl text-white shadow-xl shadow-blue-200/50 relative overflow-hidden">
                        <div class="flex justify-between items-start mb-6 relative z-10">
                            <div>
                                <p class="text-[10px] font-bold text-blue-200 flex items-center gap-1 uppercase tracking-widest"><i class="fa-solid fa-location-dot"></i> ${state.weather.location}</p>
                                <h3 class="text-5xl font-black mt-2 tracking-tighter">${state.weather.temp}°<span class="text-2xl text-blue-200">C</span></h3>
                            </div>
                            <i class="fa-solid fa-sun text-4xl text-yellow-300 drop-shadow-md animate-[spin_10s_linear_infinite]"></i>
                        </div>
                        <div class="flex justify-between items-center bg-white/20 p-3.5 rounded-2xl backdrop-blur-md relative z-10 border border-white/10">

    function renderCards(container) {
      container.innerHTML = `
          <div class="fade-in space-y-4">
              <div class="flex justify-between items-center px-1 mb-2">
                  <h2 class="text-lg font-black text-slate-800">บัตรเครดิต</h2>
                  <button onclick="openCardForm()" class="bg-theme-primary text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg shadow-orange-200/50 active:scale-90 transition-transform"><i class="fa-solid fa-plus text-sm"></i></button>
              </div>
              ${state.cards.length === 0 ? `<div class="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200"><i class="fa-solid fa-credit-card text-4xl text-slate-200 mb-3"></i><p class="text-xs font-bold text-slate-400 uppercase tracking-widest">เพิ่มบัตรใบแรกเพื่อเริ่มใช้งานค่ะ</p></div>`
          : state.cards.map(c => {
            const used = state.installments.filter(i => i.cardId === c.id).reduce((sum, i) => sum + i.amount, 0);

            return `
                      <div class="card-gradient p-6 rounded-[2rem] text-white shadow-xl relative overflow-hidden group mb-4">
                          <div class="flex justify-between items-start relative z-10 mb-6">
                              <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-sm"><i class="fa-solid fa-microchip text-xs text-white/70"></i></div><h3 class="font-black text-xl tracking-wide">${c.name}</h3></div>
                              <div class="flex gap-2">
                                  <button onclick="editCard('${c.id}')" class="w-7 h-7 bg-white/10 rounded-full flex items-center justify-center text-[10px] hover:bg-theme-primary transition-colors"><i class="fa-solid fa-pen"></i></button>
                                  <button onclick="delCard('${c.id}')" class="w-7 h-7 bg-white/10 rounded-full flex items-center justify-center text-[10px] text-white/50 hover:bg-red-500 hover:text-white transition-colors"><i class="fa-solid fa-trash"></i></button>
                              </div>
                          </div>
                          <div class="relative z-10 space-y-3">
                              <div><div class="flex justify-between text-[9px] font-bold text-white/50 uppercase tracking-widest mb-1.5"><span>ใช้ไป ${toCurr(used, 'THB')}</span><span>${pct.toFixed(0)}%</span></div><div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden"><div class="h-full bg-theme-primary transition-all duration-1000" style="width: ${pct}%"></div></div></div>
                              <div class="flex justify-between items-end pt-2"><div><p class="text-[8px] text-white/40 font-bold uppercase tracking-widest mb-0.5">วงเงินรวม</p><p class="text-lg font-bold">${toCurr(c.limit, 'THB')}</p></div><div class="text-right"><p class="text-[8px] text-white/40 font-bold uppercase tracking-widest mb-0.5">วันตัดรอบ</p><p class="text-2xl font-black text-theme-primary leading-none">${c.date}</p></div></div>
                          </div>
                          <i class="fa-brands fa-cc-visa absolute -bottom-6 -right-6 text-8xl text-white/5 opacity-50"></i>
                      </div>`;
          }).join('')}
          </div>
      `;
    }

    function renderInstallments(container) {
      const today = new Date(); const thisYm = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
      const currentMonthTotal = state.installments.reduce((sum, item) => {
        const start = item.startMonth; const end = shiftMonthStr(item.startMonth, item.dur - 1);
        if (thisYm >= start && thisYm <= end) return sum + item.amount; return sum;
      }, 0);
      container.innerHTML = `
          <div class="fade-in space-y-4">
              <div class="flex justify-between items-center px-1 mb-2">
                  <h2 class="text-lg font-black text-slate-800">รายการผ่อนชำระ</h2>
                  <button onclick="openInstForm()" class="bg-theme-primary text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg shadow-orange-200/50 active:scale-90 transition-transform"><i class="fa-solid fa-plus text-sm"></i></button>
              </div>
              <div class="bg-theme-primary/10 p-5 rounded-[2rem] border border-theme-primary/20 flex justify-between items-center shadow-sm">
                  <div><p class="text-[10px] font-bold text-theme-primary uppercase tracking-widest mb-0.5"><i class="fa-solid fa-calendar-day mr-1.5"></i>ยอดผ่อนเดือนปัจจุบัน</p><p class="text-3xl font-black text-theme-primary">${toCurr(currentMonthTotal, 'THB')}</p></div>
                  <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-theme-primary shadow-sm"><i class="fa-solid fa-receipt text-xl"></i></div>
              </div>
              ${state.installments.length === 0 ? `<div class="text-center py-10 bg-white rounded-3xl border border-slate-100"><i class="fa-solid fa-cart-shopping text-4xl text-slate-200 mb-3"></i><p class="text-xs font-bold text-slate-400 uppercase tracking-widest">ยังไม่มีรายการผ่อนค่ะ</p></div>`
          : `<div class="space-y-3">
                  ${state.installments.map(i => {
            const card = state.cards.find(c => c.id === i.cardId);
            return `
                          <div class="bg-white p-4.5 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center group">
                              <div class="flex items-center gap-4"><div class="w-11 h-11 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 shrink-0"><i class="fa-solid fa-box-open text-sm"></i></div><div><h4 class="font-black text-slate-800 text-sm leading-tight">${i.name}</h4><p class="text-[9px] font-bold text-slate-400 mt-1 tracking-wider uppercase"><i class="fa-regular fa-credit-card mr-1"></i>${card?.name || '-'} | เริ่ม ${i.startMonth}</p></div></div>
                              <div class="text-right"><p class="text-sm font-black text-theme-primary">${toCurr(i.amount, 'THB')}</p><p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">${i.dur} งวด</p><div class="flex justify-end gap-3 mt-1.5"><button onclick="editInst('${i.id}')" class="text-[9px] font-bold text-slate-400 hover:text-theme-primary uppercase tracking-widest transition-colors">แก้ไข</button><button onclick="delInst('${i.id}')" class="text-[9px] font-bold text-red-400 hover:text-red-600 uppercase tracking-widest transition-colors">ลบ</button></div></div>
                          </div>`;
          }).join('')}
                 </div>`}
          </div>
      `;
    }

    function renderInvest(container) {
      const isGold = state.investSubTab === 'gold';
      const usdRate = state.settings.usdRate || 36.5;

      let html = `
          <div class="fade-in space-y-4">
              <div class="flex justify-between items-center px-1 mb-2">
                  <h2 class="text-lg font-black text-slate-800">พอร์ตลงทุน</h2>
                  <button onclick="${isGold ? 'openGoldForm()' : 'openStockForm()'}" class="${isGold ? 'gold-gradient shadow-yellow-200/50' : 'bg-blue-500 shadow-blue-200/50'} text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform"><i class="fa-solid fa-plus text-sm"></i></button>
              </div>
              <div class="flex bg-slate-100 p-1.5 rounded-2xl mb-4">
                  <button onclick="switchInvestSubTab('stocks')" class="flex-1 py-2 text-xs font-bold rounded-xl transition-all ${!isGold ? 'bg-white shadow-sm text-blue-600' : 'text-slate-400'}">พอร์ตหุ้น/กองทุน</button>
                  <button onclick="switchInvestSubTab('gold')" class="flex-1 py-2 text-xs font-bold rounded-xl transition-all ${isGold ? 'bg-white shadow-sm text-yellow-600' : 'text-slate-400'}">พอร์ตทองคำ</button>
              </div>
      `;

      if (isGold) {
        let totalWeight = 0; let totalInvestment = 0;
        state.gold.forEach(g => {
          if (g.type === 'buy') { totalWeight += g.weight; totalInvestment += (g.weight * g.price); }
          else if (g.type === 'sell') { totalWeight -= g.weight; totalInvestment -= (g.weight * g.price); }
        });

        const sortedGold = [...state.gold].sort((a, b) => new Date(b.date) - new Date(a.date));

        html += `
              <div class="gold-gradient p-6 rounded-[2rem] text-white shadow-xl relative overflow-hidden fade-in">
                  <div class="relative z-10 flex justify-between items-center mb-4"><div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm"><i class="fa-solid fa-coins text-lg"></i></div><span class="text-[10px] font-bold uppercase tracking-widest bg-white/20 px-3 py-1 rounded-full">สินทรัพย์มั่นคง</span></div>
                  <div class="relative z-10">
                      <p class="text-[10px] font-bold text-white/70 uppercase tracking-widest mb-1">น้ำหนักทองคำรวม</p>
                      <h3 class="text-4xl font-black tracking-tight">${totalWeight.toFixed(2)} <span class="text-lg font-bold text-yellow-100">บาท</span></h3>
                      <div class="mt-4 pt-4 border-t border-white/20 flex justify-between items-end">
                          <div><p class="text-[9px] font-bold text-white/70 uppercase tracking-widest mb-0.5">เงินลงทุนสุทธิ</p><p class="text-lg font-bold">฿${toCurr(totalInvestment, '')}</p></div>
                          <div class="text-right"><p class="text-[9px] font-bold text-white/70 uppercase tracking-widest mb-0.5">ต้นทุนเฉลี่ย/บาท</p><p class="text-sm font-bold text-yellow-100">${totalWeight > 0 ? '฿' + toCurr(totalInvestment / totalWeight, '') : '฿0'}</p></div>
                      </div>
                  </div>
                  <i class="fa-solid fa-vault absolute -bottom-6 -right-4 text-8xl text-white/10 opacity-50"></i>
              </div>
              <h3 class="text-sm font-black text-slate-800 px-1 mt-6">ประวัติทำรายการทองคำ</h3>
              ${sortedGold.length === 0 ? `<div class="text-center py-10 bg-white rounded-3xl border border-slate-100"><i class="fa-solid fa-piggy-bank text-4xl text-slate-200 mb-3"></i><p class="text-xs font-bold text-slate-400 uppercase tracking-widest">ยังไม่มีรายการสะสมทองคำค่ะ</p></div>`
            : `<div class="space-y-3">
                  ${sortedGold.map(g => `
                      <div class="bg-white p-4.5 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center group">
                          <div class="flex items-center gap-4">
                              <div class="w-11 h-11 ${g.type === 'buy' ? 'bg-emerald-50 text-emerald-500' : 'bg-rose-50 text-rose-500'} rounded-2xl flex items-center justify-center shrink-0"><i class="fa-solid ${g.type === 'buy' ? 'fa-arrow-down' : 'fa-arrow-up'} text-sm"></i></div>
                              <div><h4 class="font-black text-slate-800 text-sm leading-tight">${g.type === 'buy' ? 'ซื้อทองคำ' : 'ขายทองคำ'}</h4><p class="text-[9px] font-bold text-slate-400 mt-1 tracking-wider uppercase"><i class="fa-regular fa-calendar mr-1"></i>${g.date}</p></div>
                          </div>
                          <div class="text-right">
                              <p class="text-sm font-black ${g.type === 'buy' ? 'text-emerald-500' : 'text-rose-500'}">${g.type === 'buy' ? '+' : '-'}${g.weight} บาท</p>
                              <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">@ ฿${toCurr(g.price, '')}/บาท</p>
                              <div class="flex justify-end gap-3 mt-1.5"><button onclick="editGold('${g.id}')" class="text-[9px] font-bold text-slate-400 hover:text-theme-primary uppercase tracking-widest transition-colors">แก้ไข</button><button onclick="delGold('${g.id}')" class="text-[9px] font-bold text-red-400 hover:text-red-600 uppercase tracking-widest transition-colors">ลบ</button></div>
                          </div>
                      </div>
                  `).join('')}
                 </div>`}
        `;
      } else {
        // --- STOCKS: DIME STYLE UPGRADE ---
        let totalInTHB = 0;
        let totalOutTHB = 0;
        let currentShares = {};
        let currentInvested = {};
        let currentCurrency = {};

        state.stocks.forEach(s => {
          const rate = (s.currency === 'USD') ? usdRate : 1;
          const valueTHB = (s.type === 'dividend' ? s.price : (s.shares * s.price)) * rate;

          if (!currentShares[s.symbol]) { currentShares[s.symbol] = 0; currentInvested[s.symbol] = 0; currentCurrency[s.symbol] = s.currency || 'THB'; }

          if (s.type === 'buy') {
            totalInTHB += valueTHB;
            currentShares[s.symbol] += s.shares;
            currentInvested[s.symbol] += valueTHB;
          } else if (s.type === 'sell') {
            totalOutTHB += valueTHB;
            if (currentShares[s.symbol] > 0) {
              const proportion = s.shares / currentShares[s.symbol];
              currentShares[s.symbol] -= s.shares;
              currentInvested[s.symbol] -= (currentInvested[s.symbol] * proportion);
            }
          } else if (s.type === 'dividend') {
            totalOutTHB += valueTHB;
          }
        });

        let totalCurrentValueTHB = 0;
        let activeStocksHTML = '';

        Object.keys(currentShares).forEach(sym => {
          if (currentShares[sym] > 0) {
            const cCurr = currentCurrency[sym];
            const rate = (cCurr === 'USD') ? usdRate : 1;
            const avgCostTHB = currentInvested[sym] / currentShares[sym];
            const avgCostOrig = avgCostTHB / rate;

            // Get market price from user settings
            let mktPriceOrig = state.marketPrices[sym];
            let isMktPriceSet = true;
            if (!mktPriceOrig) {
              mktPriceOrig = avgCostOrig; // Default to avg cost
              isMktPriceSet = false;
            }

            const currentValTHB = currentShares[sym] * mktPriceOrig * rate;
            totalCurrentValueTHB += currentValTHB;
            const currSym = cCurr === 'USD' ? '$' : '฿';

            activeStocksHTML += `
                    <div class="bg-white/10 rounded-xl p-4 flex justify-between items-center hover:bg-white/20 transition-colors cursor-pointer" onclick="openMarketPriceForm('${sym}', '${cCurr}')">
                        <div class="flex flex-col">
                            <span class="text-[16px] font-bold text-white">${sym}</span>
                            ${!isMktPriceSet ? `<span class="text-[9px] text-yellow-300"><i class="fa-solid fa-pen-to-square mr-1"></i>อัปเดตราคา</span>` : `<span class="text-[9px] text-emerald-300">อัปเดตแล้ว</span>`}
                        </div>
                        <div class="text-right flex flex-col gap-1">
                            <span class="text-[13px] font-semibold text-white">${currentShares[sym].toFixed(6)} หุ้น</span>
                            <span class="text-[11px] text-white/80">ทุนเฉลี่ย ${currSym}${toCurr(avgCostOrig, '')} (฿${toCurr(avgCostTHB, '')})</span>
                        </div>
                    </div>
                `;
          }
        });

        let profitLossTHB = (totalCurrentValueTHB + totalOutTHB) - totalInTHB;
        let profitLossPercent = totalInTHB > 0 ? (profitLossTHB / totalInTHB) * 100 : 0;
        let signText = profitLossTHB >= 0 ? '+' : '';
        let signColor = profitLossTHB >= 0 ? 'text-emerald-300' : 'text-rose-300';

        const sortedStocks = [...state.stocks].sort((a, b) => new Date(b.date) - new Date(a.date));

        html += `
              <div class="dime-gradient rounded-[24px] p-5 text-white shadow-[0_10px_30px_rgba(0,119,214,0.3)] fade-in mb-6 relative overflow-hidden">
                  <div class="relative z-10 flex justify-between items-start mb-5">
                      <div class="flex flex-col">
                          <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center text-lg mb-3 shadow-inner">📈</div>
                          <div class="text-[12px] font-medium text-white/90 mb-1">มูลค่าสินทรัพย์รวม (THB)</div>
                          <div class="text-[32px] font-extrabold tracking-tight mb-1.5 leading-none">฿${toCurr(totalCurrentValueTHB, '')}</div>
                          <div class="text-[12px] font-semibold ${signColor} bg-slate-900/20 w-fit px-2 py-1 rounded-lg">
                              ผลตอบแทน ${signText}฿${toCurr(Math.abs(profitLossTHB), '')} / ${signText}${profitLossPercent.toFixed(2)}%
                          </div>
                      </div>
                      <div class="bg-white/20 px-3 py-1.5 rounded-full text-[10px] font-bold backdrop-blur-sm shadow-sm">พอร์ตลงทุนรวม</div>
                  </div>
                  
                  <div class="relative z-10 text-[11px] font-bold text-white/90 mb-3 pb-2 border-b border-white/20">สถานะหุ้นที่ถือครองปัจจุบัน (คลิกเพื่อใส่ราคาตลาด)</div>
                  <div class="relative z-10 flex flex-col gap-2.5">
                      ${activeStocksHTML || '<p class="text-xs text-white/50 py-2 text-center">ยังไม่มีหุ้นในพอร์ต</p>'}
                  </div>
                  <i class="fa-solid fa-chart-line absolute -bottom-6 -right-6 text-8xl text-white/10 opacity-40"></i>
              </div>

              <h3 class="text-sm font-black text-slate-800 px-1 mt-6">ประวัติหุ้น/กองทุน/ปันผล</h3>
              ${sortedStocks.length === 0 ? `
                  <div class="text-center py-10 bg-white rounded-3xl border border-slate-100"><i class="fa-solid fa-seedling text-4xl text-slate-200 mb-3"></i><p class="text-xs font-bold text-slate-400 uppercase tracking-widest">ยังไม่มีรายการลงทุนค่ะ</p></div>
              ` : `
                  <div class="space-y-3">
                      ${sortedStocks.map(s => {
          const curr = s.currency || 'THB';
          const currSym = curr === 'USD' ? '$' : '฿';
          let icon, bgColor, textColor, titleText, typeText, detailText, amountText;

          if (s.type === 'buy') {
            icon = 'fa-cart-plus'; bgColor = 'bg-blue-50'; textColor = 'text-blue-500'; titleText = s.symbol; typeText = 'ซื้อ'; detailText = `${s.shares} หุ้น @ ${currSym}${toCurr(s.price, '')}`; amountText = `${currSym}${toCurr(s.shares * s.price, '')}`;
          } else if (s.type === 'sell') {
            icon = 'fa-hand-holding-dollar'; bgColor = 'bg-orange-50'; textColor = 'text-orange-500'; titleText = s.symbol; typeText = 'ขาย'; detailText = `${s.shares} หุ้น @ ${currSym}${toCurr(s.price, '')}`; amountText = `${currSym}${toCurr(s.shares * s.price, '')}`;
          } else if (s.type === 'dividend') {
            icon = 'fa-sack-dollar'; bgColor = 'bg-purple-50'; textColor = 'text-purple-500'; titleText = s.symbol; typeText = 'เงินปันผล'; detailText = 'โอนเข้าพอร์ต (เงินสด)'; amountText = `+${currSym}${toCurr(s.price, '')}`;
          }

          return `
                          <div class="bg-white p-4.5 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center group">
                              <div class="flex items-center gap-4">
                                  <div class="w-11 h-11 ${bgColor} ${textColor} rounded-2xl flex items-center justify-center shrink-0"><i class="fa-solid ${icon} text-sm"></i></div>
                                  <div><h4 class="font-black text-slate-800 text-sm leading-tight">${titleText}</h4><p class="text-[9px] font-bold text-slate-400 mt-1 tracking-wider uppercase"><span class="${textColor}">${typeText}</span> | ${s.date}</p></div>
                              </div>
                              <div class="text-right">
                                  <p class="text-sm font-black text-slate-800">${amountText}</p>
                                  <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">${detailText}</p>
                                  <div class="flex justify-end gap-3 mt-1.5"><button onclick="editStock('${s.id}')" class="text-[9px] font-bold text-slate-400 hover:text-theme-primary uppercase tracking-widest transition-colors">แก้ไข</button><button onclick="delStock('${s.id}')" class="text-[9px] font-bold text-red-400 hover:text-red-600 uppercase tracking-widest transition-colors">ลบรายการ</button></div>
                              </div>
                          </div>`;
        }).join('')}
                  </div>
              `}
        `;
      }
      html += `</div>`;
      container.innerHTML = html;
    }

    function renderSummary(container) {
      let first = '9999-99'; let last = '0000-00';
      if (state.installments.length > 0) {
        state.installments.forEach(i => {
          if (i.startMonth < first) first = i.startMonth;
          const end = shiftMonthStr(i.startMonth, i.dur - 1);
          if (end > last) last = end;
        });
      }
      const stats = [];
      if (first !== '9999-99') {
        let cur = first;
        while (cur <= last && stats.length < 36) {
          let s = 0;
          state.installments.forEach(i => { const e = shiftMonthStr(i.startMonth, i.dur - 1); if (cur >= i.startMonth && cur <= e) s += i.amount; });
          stats.push({ ym: cur, total: s }); cur = shiftMonthStr(cur, 1);
        }
      }

      container.innerHTML = `
          <div class="fade-in space-y-5">
              <h2 class="text-lg font-black text-slate-800 px-1">วิเคราะห์ภาพรวมการเงิน</h2>
              ${stats.length > 0 ? `

    window.delGold = (id) => { if (confirm("ต้องการลบประวัติการทำรายการนี้ใช่ไหมคะ?")) { state.gold = state.gold.filter(x => x.id !== id); renderViewport(); forceSave(); } };

    // --- CARDS & INST FORMS (Shortened for space, logic works seamlessly) ---
    window.openCardForm = () => { /* Add Card Form UI */ }; window.commitCard = () => { /* Logic */ }; window.editCard = (id) => { /* UI */ }; window.updateCard = (id) => { /* Logic */ }; window.delCard = (id) => { /* Logic */ };
    window.openInstForm = () => { /* Add Inst Form UI */ }; window.commitInst = () => { /* Logic */ }; window.editInst = (id) => { /* UI */ }; window.updateInst = (id) => { /* Logic */ }; window.delInst = (id) => { /* Logic */ };

    // Injecting standard forms quickly
    window.openCardForm = () => { openModal('เพิ่มบัตรเครดิต', `<div><label class="text-[10px] font-bold text-slate-400">ชื่อบัตร</label><input id="in-n" class="w-full p-4 bg-slate-50 rounded-2xl mt-1"></div><div><label class="text-[10px] font-bold text-slate-400">วงเงินรวม</label><input id="in-l" type="number" class="w-full p-4 bg-slate-50 rounded-2xl mt-1"></div><div><label class="text-[10px] font-bold text-slate-400">วันตัดรอบ</label><input id="in-d" type="number" class="w-full p-4 bg-slate-50 rounded-2xl mt-1"></div><button onclick="commitCard()" class="w-full py-4 bg-theme-primary text-white rounded-2xl font-bold mt-2">บันทึก</button>`); };
    window.commitCard = () => { const n = document.getElementById('in-n').value, l = document.getElementById('in-l').value, d = document.getElementById('in-d').value; if (!n || !l || !d) return; state.cards.push({ id: Date.now().toString(), name: n, limit: Number(l), date: Number(d) }); closeModal(); renderViewport(); forceSave(); };
    window.editCard = (id) => { const c = state.cards.find(x => x.id === id); openModal('แก้ไขบัตร', `<div><input id="in-n" value="${c.name}" class="w-full p-4 bg-slate-50 rounded-2xl mb-2"></div><div><input id="in-l" type="number" value="${c.limit}" class="w-full p-4 bg-slate-50 rounded-2xl mb-2"></div><div><input id="in-d" type="number" value="${c.date}" class="w-full p-4 bg-slate-50 rounded-2xl"></div><button onclick="updateCard('${id}')" class="w-full py-4 bg-theme-primary text-white rounded-2xl font-bold mt-2">อัปเดต</button>`); };
    window.updateCard = (id) => { const idx = state.cards.findIndex(x => x.id === id); state.cards[idx] = { ...state.cards[idx], name: document.getElementById('in-n').value, limit: Number(document.getElementById('in-l').value), date: Number(document.getElementById('in-d').value) }; closeModal(); renderViewport(); forceSave(); };
    window.delCard = (id) => { if (confirm("ลบบัตร?")) { state.cards = state.cards.filter(x => x.id !== id); state.installments = state.installments.filter(x => x.cardId !== id); renderViewport(); forceSave(); } };
    window.openInstForm = () => { if (state.cards.length === 0) return alert('เพิ่มบัตรก่อนค่ะ'); openModal('เพิ่มรายการผ่อน', `<select id="in-cid" class="w-full p-4 bg-slate-50 rounded-2xl mb-2">${state.cards.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select><input id="in-item" placeholder="ชื่อสินค้า" class="w-full p-4 bg-slate-50 rounded-2xl mb-2"><div class="flex gap-2"><input id="in-s" type="month" class="w-full p-4 bg-slate-50 rounded-2xl mb-2"><input id="in-dr" type="number" placeholder="งวด" class="w-24 p-4 bg-slate-50 rounded-2xl mb-2"></div><input id="in-a" type="number" placeholder="ยอดจ่ายต่อเดือน" class="w-full p-4 bg-slate-50 rounded-2xl"><button onclick="commitInst()" class="w-full py-4 bg-theme-primary text-white rounded-2xl font-bold mt-2">บันทึก</button>`); };
    window.commitInst = () => { const c = document.getElementById('in-cid').value, n = document.getElementById('in-item').value, s = document.getElementById('in-s').value, d = document.getElementById('in-dr').value, a = document.getElementById('in-a').value; if (!n || !s || !d || !a) return; state.installments.push({ id: Date.now().toString(), cardId: c, name: n, startMonth: s, dur: Number(d), amount: Number(a) }); closeModal(); renderViewport(); forceSave(); };
    window.editInst = (id) => { const inst = state.installments.find(x => x.id === id); openModal('แก้ไขรายการผ่อน', `<select id="in-cid" class="w-full p-4 bg-slate-50 rounded-2xl mb-2">${state.cards.map(c => `<option value="${c.id}" ${c.id === inst.cardId ? 'selected' : ''}>${c.name}</option>`).join('')}</select><input id="in-item" value="${inst.name}" class="w-full p-4 bg-slate-50 rounded-2xl mb-2"><div class="flex gap-2"><input id="in-s" type="month" value="${inst.startMonth}" class="w-full p-4 bg-slate-50 rounded-2xl mb-2"><input id="in-dr" type="number" value="${inst.dur}" class="w-24 p-4 bg-slate-50 rounded-2xl mb-2"></div><input id="in-a" type="number" value="${inst.amount}" class="w-full p-4 bg-slate-50 rounded-2xl"><button onclick="updateInst('${id}')" class="w-full py-4 bg-theme-primary text-white rounded-2xl font-bold mt-2">อัปเดต</button>`); };
    window.updateInst = (id) => { const idx = state.installments.findIndex(x => x.id === id); if (idx !== -1) { state.installments[idx] = { ...state.installments[idx], cardId: document.getElementById('in-cid').value, name: document.getElementById('in-item').value, startMonth: document.getElementById('in-s').value, dur: Number(document.getElementById('in-dr').value), amount: Number(document.getElementById('in-a').value) }; closeModal(); renderViewport(); forceSave(); } };
    window.delInst = (id) => { if (confirm("ลบรายการผ่อน?")) { state.installments = state.installments.filter(x => x.id !== id); renderViewport(); forceSave(); } };

    // --- SETTINGS MENU ---
    window.showSettingsMenu = () => {
      openModal('ตั้งค่าแอปพลิเคชัน', `
          <div class="space-y-6">
              <div>
                  <h4 class="text-sm font-bold text-slate-800 mb-2">อัตราแลกเปลี่ยน (USD -> THB)</h4>
                  <div class="flex items-center gap-3">
                      <span class="text-xs font-bold text-slate-500 w-16 text-right">1 USD =</span>
                      <input id="set-usd-rate" type="number" step="0.1" class="flex-1 p-3 bg-slate-50 border border-slate-100 rounded-xl outline-none text-sm font-bold text-slate-800 text-center" value="${state.settings.usdRate || 36.5}" onchange="updateUsdRate(this.value)">
                      <span class="text-xs font-bold text-slate-500 w-8">บาท</span>
                  </div>
              </div>
              <hr class="border-slate-100">
              <div>
                  <h4 class="text-sm font-bold text-slate-800 mb-3">การแจ้งเตือน</h4>
                  <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                      <div><p class="text-xs font-bold text-slate-700">เตือนวันชำระบัตรเครดิต</p><p class="text-[9px] text-slate-400 mt-0.5">แจ้งเตือนล่วงหน้า 3 วันก่อนวันตัดรอบ</p></div>
                      <button onclick="toggleNotif()" class="w-12 h-6 rounded-full transition-colors relative shadow-inner ${state.settings.enableNotif ? 'bg-emerald-500' : 'bg-slate-300'}"><div class="w-5 h-5 bg-white rounded-full absolute top-0.5 transition-all shadow-sm ${state.settings.enableNotif ? 'right-0.5' : 'left-0.5'}"></div></button>
                  </div>
              </div>
              <hr class="border-slate-100">
              <div>
                  <h4 class="text-sm font-bold text-slate-800 mb-1">จัดการข้อมูล (Backup & Restore)</h4>
                  <p class="text-[10px] text-slate-400 mb-3">แอปทำงานแบบ Offline ข้อมูลอยู่แค่ในเครื่องนี้ อย่าลืมเซฟเป็นประจำนะคะ</p>
                  <div class="flex gap-2 mb-2">
                      <button onclick="exportData()" class="flex-1 p-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold text-theme-primary hover:bg-theme-primary/10 transition-colors flex items-center justify-center gap-2"><i class="fa-solid fa-file-zipper"></i> เซฟเป็น .zip</button>
                      <button onclick="document.getElementById('importFile').click()" class="flex-1 p-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold text-slate-600 hover:bg-theme-primary/10 transition-colors flex items-center justify-center gap-2"><i class="fa-solid fa-upload"></i> โหลดข้อมูล</button>
                  </div>
                  <button onclick="clearAllData()" class="w-full p-3.5 bg-rose-50 border border-rose-100 rounded-2xl text-xs font-bold text-rose-500 hover:bg-rose-100 transition-colors flex items-center justify-center gap-2"><i class="fa-solid fa-trash-can"></i> ล้างข้อมูลทั้งหมดในเครื่อง</button>
              </div>
              <button onclick="closeModal()" class="w-full py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold uppercase tracking-widest text-sm mt-4 active:scale-95 transition-transform">ปิดหน้าต่างนี้</button>
          </div>
      `);
    };

    window.updateUsdRate = (val) => { if (val && Number(val) > 0) { state.settings.usdRate = Number(val); forceSave(); renderViewport(); } };
    window.setTheme = (c) => { applyTheme(c); forceSave(); closeModal(); renderViewport(); };
    window.toggleNotif = () => { state.settings.enableNotif = !state.settings.enableNotif; forceSave(); showSettingsMenu(); renderViewport(); };

    // --- NOTIFICATIONS ---
    window.showNotifs = () => {
      if (!state.settings.enableNotif) {
        openModal('การแจ้งเตือน', `<p class="text-center text-slate-400 py-8 text-xs font-bold uppercase tracking-widest">คุณได้ปิดการแจ้งเตือนไว้ค่ะ 🔕</p><button onclick="closeModal()" class="w-full py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold uppercase tracking-widest text-sm mt-4 active:scale-95 transition-transform">ปิดหน้าต่างนี้</button>`); return;
      }
      const today = new Date().getDate();
      const list = state.cards.filter(c => { const diff = c.date - today; return diff >= 0 && diff <= 3; });
      openModal('การแจ้งเตือน', `<div class="space-y-3">${list.length === 0 ? '<p class="text-center text-slate-400 py-8 text-xs font-bold uppercase tracking-widest">ยังไม่มีเรื่องด่วนค่ะ ✌️</p>' : list.map(c => `<div class="p-4 rounded-2xl bg-slate-50 flex items-center gap-4 border border-slate-100"><div class="w-10 h-10 bg-theme-primary/10 rounded-full flex items-center justify-center text-theme-primary"><i class="fa-solid fa-clock"></i></div><div><p class="text-sm font-black text-slate-800">บัตร ${c.name}</p><p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-0.5">ตัดรอบใน ${c.date - today === 0 ? 'วันนี้!' : 'อีก ' + (c.date - today) + ' วัน'}</p></div></div>`).join('')}<button onclick="closeModal()" class="w-full py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold uppercase tracking-widest text-sm mt-4 active:scale-95 transition-transform">ปิดหน้าต่างนี้</button></div>`);
    };
    function updateNotifs() {
      const dot = document.getElementById('notif-dot'); if (!dot) return;
      if (!state.settings.enableNotif) { dot.classList.add('hidden'); return; }
      const today = new Date().getDate();
      const has = state.cards.some(c => (c.date - today) >= 0 && (c.date - today) <= 3);
      if (has) dot.classList.remove('hidden'); else dot.classList.add('hidden');
    }

    window.onload = run;
  </script>
</body>

</html>
