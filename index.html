<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meetang - Smart Tracker Pro</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Standard Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Store Firebase functions in window for global access
        window.fb = { initializeApp, getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, getFirestore, doc, setDoc, getDoc, onSnapshot };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');
        :root {
            --primary: #f97316;
            --primary-light: #fff7ed;
        }
        body { font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s; }
        
        .text-theme-primary { color: var(--primary); }
        .bg-theme-primary { background-color: var(--primary); }
        .border-theme-primary { border-color: var(--primary); }
        .tab-active { color: var(--primary); border-top: 2px solid var(--primary); } 
        .tab-inactive { color: #94a3b8; border-top: 2px solid transparent; }
        
        .card-navy { background: linear-gradient(135deg, #2A3441 0%, #1A222C 100%); }
        .safe-pb { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 85px); }
        .bottom-sheet { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .status-safe { color: #10b981; }
        .status-warning { color: #f59e0b; }
        .status-danger { color: #ef4444; }
        .logo-hint:active { transform: scale(1.1); transition: 0.1s; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen relative overflow-x-hidden">

    <!-- Header Section -->
    <header class="bg-white px-5 py-4 sticky top-0 z-40 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2.5">
            <!-- Long press for Admin -->
            <button onmousedown="startLogoPress()" onmouseup="endLogoPress()" ontouchstart="startLogoPress()" ontouchend="endLogoPress()" class="logo-hint outline-none">
                <i class="fa-solid fa-cat text-theme-primary text-2xl drop-shadow-sm"></i>
            </button>
            <div>
                <h1 class="text-xl font-bold text-slate-800 flex items-baseline gap-1.5 leading-tight">
                    Meetang <span class="text-[9px] font-normal text-slate-400 border-l pl-1.5 border-slate-200 uppercase tracking-widest leading-none">Smart Tracker</span>
                </h1>
                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest leading-none">บัญชีผ่อนส่วนตัวของคุณ 🔒</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div id="sync-status" class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-300">
                <i id="sync-icon" class="fa-solid fa-cloud text-xs"></i>
            </div>
            <button id="theme-btn" onclick="openThemeMenu()" class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:text-theme-primary transition-colors hidden">
                <i class="fa-solid fa-palette text-sm"></i>
            </button>
            <button onclick="openNotifications()" class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 relative hover:text-theme-primary">
                <i class="fa-solid fa-bell text-sm"></i>
                <div id="notif-badge" class="absolute top-1.5 right-1.5 w-3.5 h-3.5 bg-orange-500 rounded-full text-[7px] text-white flex items-center justify-center font-bold hidden shadow-sm">0</div>
            </button>
        </div>
    </header>

    <!-- App Viewport -->
    <main class="p-4 max-w-md mx-auto w-full safe-pb" id="app-viewport">
        <div class="flex flex-col items-center justify-center py-32 text-slate-400">
            <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4 text-theme-primary"></i>
            <p class="text-sm font-bold animate-pulse">กำลังกู้คืนข้อมูล Cloud...</p>
        </div>
    </main>

    <!-- Modal Form -->
    <div id="modal-screen" class="fixed inset-0 bg-slate-900/60 z-50 hidden flex flex-col justify-end transition-opacity">
        <div class="bg-white w-full max-w-md mx-auto rounded-t-[2rem] p-6 bottom-sheet shadow-2xl relative max-h-[90vh] overflow-y-auto">
            <div class="w-10 h-1 bg-slate-200 rounded-full mx-auto mb-5" onclick="closeModal()"></div>
            <div id="modal-inner"></div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around items-center z-40 px-2 h-16 max-w-md mx-auto w-full shadow-[0_-8px_20px_-5px_rgba(0,0,0,0.05)] pb-safe-bottom">
        <button onclick="changeTab('cards')" id="nav-cards" class="flex flex-col items-center justify-center w-full h-full space-y-1 transition-all">
            <i class="fa-solid fa-credit-card text-lg"></i>
            <span class="text-[9px] font-bold">จัดการบัตร</span>
        </button>
        <button onclick="changeTab('budget')" id="nav-budget" class="flex flex-col items-center justify-center w-full h-full space-y-1 transition-all">
            <i class="fa-solid fa-chart-pie text-lg"></i>
            <span class="text-[9px] font-bold">งบประมาณ</span>
        </button>
        <button onclick="changeTab('installments')" id="nav-installments" class="flex flex-col items-center justify-center w-full h-full space-y-1 transition-all">
            <i class="fa-solid fa-list-check text-lg"></i>
            <span class="text-[9px] font-bold">รายการผ่อน</span>
        </button>
        <button onclick="changeTab('summary')" id="nav-summary" class="flex flex-col items-center justify-center w-full h-full space-y-1 transition-all">
            <i class="fa-solid fa-chart-line text-lg"></i>
            <span class="text-[9px] font-bold">สรุปรายเดือน</span>
        </button>
    </nav>

    <script type="module">
        // --- DATA STATE ---
        let appState = {
            cards: [],
            installments: [],
            activeTab: 'cards',
            theme: { color: '#f97316', name: 'Original Orange' },
            isAdmin: false
        };

        const MASTER_STORAGE_KEY = 'MEETANG_SECURE_STORAGE_V5';
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'meetang-pro-app';
        let db, auth, user, logoTimer;

        // --- FIREBASE START ---
        async function startApp() {
            const { fb } = window;
            const firebaseConfig = JSON.parse(__firebase_config);
            const app = fb.initializeApp(firebaseConfig);
            auth = fb.getAuth(app);
            db = fb.getFirestore(app);

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await fb.signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await fb.signInAnonymously(auth);
                }

                fb.onAuthStateChanged(auth, (u) => {
                    user = u;
                    if (user) syncData();
                });
            } catch (e) {
                console.error("Connection Error", e);
                loadOffline();
            }
        }

        async function syncData() {
            const { fb } = window;
            const docRef = fb.doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'appState');
            
            const docSnap = await fb.getDoc(docRef);
            if (docSnap.exists()) {
                appState = { ...appState, ...docSnap.data() };
            } else {
                const local = localStorage.getItem(MASTER_STORAGE_KEY);
                if (local) appState = JSON.parse(local);
                else appState.cards = [{ id: 'c1', name: 'KBank', limit: 100000, date: 20 }];
                await forceSave();
            }
            
            applyTheme(appState.theme?.color || '#f97316');
            updateUI();
        }

        async function forceSave() {
            if (!user) return;
            updateSyncStatus(true);
            const { fb } = window;
            const docRef = fb.doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'appState');
            
            try {
                await fb.setDoc(docRef, appState);
                localStorage.setItem(MASTER_STORAGE_KEY, JSON.stringify(appState));
                updateSyncStatus(false);
            } catch (e) {
                updateSyncStatus(false, true);
            }
        }

        function loadOffline() {
            const local = localStorage.getItem(MASTER_STORAGE_KEY);
            if (local) appState = JSON.parse(local);
            applyTheme(appState.theme?.color || '#f97316');
            updateUI();
        }

        // --- UI UTILS ---
        function updateSyncStatus(isSaving, hasError = false) {
            const icon = document.getElementById('sync-icon');
            const box = document.getElementById('sync-status');
            if (isSaving) {
                icon.className = "fa-solid fa-arrows-rotate fa-spin text-xs";
                box.className = "w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-orange-400";
            } else if (hasError) {
                icon.className = "fa-solid fa-cloud-slash text-xs";
                box.className = "w-8 h-8 rounded-full bg-red-50 flex items-center justify-center text-red-500";
            } else {
                icon.className = "fa-solid fa-cloud text-xs";
                box.className = "w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-emerald-500";
            }
        }

        function applyTheme(color) {
            document.documentElement.style.setProperty('--primary', color);
            document.documentElement.style.setProperty('--primary-light', color + "10");
        }

        function updateUI() {
            const btnTheme = document.getElementById('theme-btn');
            if (appState.isAdmin) btnTheme.classList.remove('hidden');
            else btnTheme.classList.add('hidden');
            
            updateNotifBadge();
            renderViewport();
        }

        // --- ADMIN ACCESS ---
        window.startLogoPress = () => {
            logoTimer = setTimeout(() => {
                const pass = prompt("ใส่รหัสผ่าน Admin เพื่อเปิดสิทธิ์การตั้งค่า:");
                if (pass === "MEETANG-ADMIN") {
                    appState.isAdmin = true;
                    forceSave();
                    alert("เปิดสิทธิ์ Admin สำเร็จ!");
                    updateUI();
                } else if(pass !== null) alert("รหัสผ่านไม่ถูกต้อง");
            }, 2000);
        };
        window.endLogoPress = () => clearTimeout(logoTimer);

        window.openThemeMenu = () => {
            const themes = [
                { n: 'Original Orange', c: '#f97316' },
                { n: 'Smart Blue', c: '#0ea5e9' },
                { n: 'Healthy Green', c: '#10b981' },
                { n: 'Midnight Violet', c: '#8b5cf6' },
                { n: 'Elegant Rose', c: '#f43f5e' }
            ];
            let html = `<div class="grid grid-cols-1 gap-2.5">
                ${themes.map(t => `
                    <button onclick="setAppTheme('${t.c}', '${t.n}')" class="flex items-center justify-between p-4 rounded-2xl border ${appState.theme.color === t.c ? 'border-theme-primary bg-slate-50' : 'border-slate-100'}">
                        <div class="flex items-center gap-3"><div class="w-5 h-5 rounded-full" style="background:${t.c}"></div><span class="text-sm font-bold text-slate-700">${t.n}</span></div>
                        ${appState.theme.color === t.c ? `<i class="fa-solid fa-check text-theme-primary"></i>` : ''}
                    </button>`).join('')}
            </div>`;
            renderModal('ปรับแต่งธีมการใช้งาน', html);
        };

        window.setAppTheme = (c, n) => {
            appState.theme = { color: c, name: n };
            applyTheme(c);
            forceSave();
            closeModal();
            updateUI();
        };

        // --- NAVIGATION & VIEWS ---
        window.changeTab = (t) => {
            appState.activeTab = t;
            const menu = ['cards', 'budget', 'installments', 'summary'];
            menu.forEach(m => {
                const btn = document.getElementById(`nav-${m}`);
                if (btn) btn.className = `flex flex-col items-center justify-center w-full h-full space-y-1 ${t === m ? 'tab-active' : 'tab-inactive'}`;
            });
            renderViewport();
        };

        const toCurr = (v) => '฿' + Number(v).toLocaleString(undefined, {minimumFractionDigits: 1});
        const getLongM = (ym) => {
            const th = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
            const [y, m] = ym.split('-'); return th[parseInt(m)-1] + ' ' + y;
        };
        const shiftM = (ym, n) => {
            const [y, m] = ym.split('-').map(Number);
            const d = new Date(y, m - 1 + n, 1); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        };

        function renderViewport() {
            const view = document.getElementById('app-viewport');
            if (!view) return;
            view.innerHTML = '';
            const t = appState.activeTab;

            if (t === 'cards') {
                view.innerHTML = `<h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fa-solid fa-credit-card text-theme-primary"></i> จัดการบัตรเครดิต</h2>
                    <div class="space-y-3">
                        ${appState.cards.map(c => `<div class="card-navy p-5 rounded-2xl text-white shadow-md relative overflow-hidden">
                            <div class="flex justify-between items-start mb-6 relative z-10">
                                <h3 class="text-lg font-bold">${c.name}</h3>
                                <div class="flex gap-2">
                                    <button onclick="editCard('${c.id}')" class="w-7 h-7 bg-white/10 rounded-full flex items-center justify-center hover:bg-theme-primary transition-all"><i class="fa-solid fa-pen text-[10px]"></i></button>
                                    <button onclick="delCard('${c.id}')" class="w-7 h-7 bg-white/10 rounded-full flex items-center justify-center hover:bg-red-500 transition-all"><i class="fa-solid fa-trash text-[10px]"></i></button>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 relative z-10 gap-2">
                                <div><p class="text-[9px] text-white/30 uppercase tracking-widest leading-none mb-1">Limit</p><p class="text-lg font-bold">${toCurr(c.limit)}</p></div>
                                <div class="text-right"><p class="text-[9px] text-white/30 uppercase tracking-widest leading-none mb-1">Due Date</p><p class="text-xl font-black text-orange-400">${c.date}</p></div>
                            </div>
                        </div>`).join('')}
                    </div>
                    <button onclick="openCardForm()" class="fixed bottom-20 right-5 w-12 h-12 bg-theme-primary text-white rounded-full shadow-lg flex items-center justify-center text-xl z-40 active:scale-90 transition-all"><i class="fa-solid fa-plus"></i></button>`;
            } 
            else if (t === 'budget') {
                const totalLim = appState.cards.reduce((s, c) => s + c.limit, 0);
                const totalUsd = appState.installments.reduce((s, i) => s + i.amount, 0);
                const totalPct = totalLim > 0 ? Math.min((totalUsd / totalLim) * 100, 100) : 0;
                view.innerHTML = `<h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fa-solid fa-chart-pie text-theme-primary"></i> งบประมาณภาพรวม</h2>
                    <div class="bg-white p-5 rounded-3xl border border-theme-primary/10 shadow-sm mb-5">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center mb-1 leading-none">Total Limit</p>
                        <h3 class="text-2xl font-black text-slate-800 text-center mb-4 leading-tight">${toCurr(totalLim)}</h3>
                        <div class="flex justify-between items-end mb-2">
                            <div class="text-center"><p class="text-[9px] text-slate-400 font-bold uppercase leading-none">Used</p><p class="text-sm font-bold text-red-500 leading-tight">${toCurr(totalUsd)}</p></div>
                            <div class="h-10 w-[1px] bg-slate-100"></div>
                            <div class="text-center"><p class="text-[9px] text-slate-400 font-bold uppercase leading-none">Remaining</p><p class="text-sm font-bold text-emerald-500 leading-tight">${toCurr(totalLim - totalUsd)}</p></div>
                        </div>
                        <div class="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-theme-primary transition-all duration-1000" style="width: ${totalPct}%"></div></div>
                    </div>
                    <div class="space-y-3">
                        ${appState.cards.map(c => {
                            const used = appState.installments.filter(i => i.cardId === c.id).reduce((s, i) => s + i.amount, 0);
                            const pct = Math.min((used / c.limit) * 100, 100);
                            return `<div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                <div class="flex justify-between items-center mb-2"><h3 class="font-bold text-slate-700 text-sm leading-none">${c.name}</h3><span class="text-[9px] font-bold bg-slate-50 px-2 py-0.5 rounded-full leading-none">${pct.toFixed(0)}%</span></div>
                                <div class="w-full h-1.5 bg-slate-50 rounded-full mb-2"><div class="h-full bg-theme-primary" style="width: ${pct}%"></div></div>
                                <div class="flex justify-between items-center"><span class="text-[9px] text-slate-400 italic">Avail: ${toCurr(c.limit - used)}</span><button onclick="openBudgetForm('${c.id}')" class="text-[9px] font-bold text-theme-primary underline uppercase leading-none">ปรับงบ</button></div>
                            </div>`;
                        }).join('')}
                    </div>
                    <button onclick="openBudgetForm()" class="fixed bottom-20 right-5 w-12 h-12 bg-theme-primary text-white rounded-full shadow-lg flex items-center justify-center text-lg z-40 active:scale-90 transition-all"><i class="fa-solid fa-pen-to-square"></i></button>`;
            }
            else if (t === 'installments') {
                view.innerHTML = `<h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fa-solid fa-list-check text-theme-primary"></i> รายการผ่อนของคุณ</h2>
                    <div class="space-y-2.5">
                        ${appState.installments.length === 0 ? `<div class="py-20 text-center text-slate-300 text-xs">ยังไม่มีรายการผ่อนค่ะ</div>` : 
                        appState.installments.map(i => {
                            const card = appState.cards.find(c => c.id === i.cardId);
                            return `<div class="bg-white p-4 rounded-2xl border border-slate-50 shadow-sm flex justify-between items-center group">
                                <div class="flex items-center gap-3"><div class="w-9 h-9 bg-slate-50 rounded-xl flex items-center justify-center text-slate-300 shrink-0"><i class="fa-solid fa-tag text-xs"></i></div>
                                <div><h4 class="font-bold text-slate-800 text-sm leading-tight">${i.name}</h4><p class="text-[9px] text-slate-400 mt-0.5">${card ? card.name : '-'} | เริ่ม ${i.startMonth}</p></div></div>
                                <div class="text-right"><p class="text-sm font-black text-theme-primary leading-tight">${toCurr(i.amount)}</p><p class="text-[8px] text-slate-400 font-bold leading-none">${i.duration} งวด</p><button onclick="delInst('${i.id}')" class="text-[9px] text-red-300 font-bold mt-1 uppercase leading-none">ลบ</button></div>
                            </div>`;
                        }).join('')}
                    </div>
                    <button onclick="openInstForm()" class="fixed bottom-20 right-5 w-12 h-12 bg-theme-primary text-white rounded-full shadow-lg flex items-center justify-center text-xl z-40 active:scale-90 transition-all"><i class="fa-solid fa-plus"></i></button>`;
            }
            else if (t === 'summary') renderSummary(view);
        }

        function renderSummary(container) {
            if (appState.installments.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-slate-300 text-xs">เพิ่มรายการผ่อนเพื่อดูสรุปออโต้จ้า</div>`; return;
            }
            let first = appState.installments[0].startMonth;
            let last = '0000-00';
            appState.installments.forEach(i => {
                if (i.startMonth < first) first = i.startMonth;
                const end = shiftM(i.startMonth, i.duration - 1); if (end > last) last = end;
            });
            const stats = []; let curr = first;
            while (curr <= last && stats.length < 36) {
                let sum = 0; appState.installments.forEach(i => {
                    const iEnd = shiftM(i.startMonth, i.duration - 1); if (curr >= i.startMonth && curr <= iEnd) sum += i.amount;
                });
                stats.push({ ym: curr, total: sum }); curr = shiftM(curr, 1);
            }
            container.innerHTML = `<h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fa-solid fa-chart-line text-theme-primary"></i> สรุปยอดจ่ายรายเดือน</h2>
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-50 mb-5"><div class="h-48 w-full"><canvas id="sumCanvas"></canvas></div></div>
                <div class="bg-white rounded-3xl shadow-sm border border-slate-50 overflow-hidden divide-y divide-slate-50">
                    <div class="p-3.5 bg-slate-50/50 flex justify-between text-[9px] font-bold text-slate-400 uppercase tracking-widest"><span>ประจำเดือน</span><span>ยอดรวมจ่าย</span></div>
                    ${stats.map(s => `<div class="p-4 flex justify-between items-center hover:bg-slate-50 transition-colors">
                        <div><p class="text-sm font-bold text-slate-800 leading-tight">${getLongM(s.ym)}</p><p class="text-[8px] text-slate-400 uppercase tracking-widest mt-0.5 leading-none">Auto-Summary</p></div>
                        <p class="text-sm font-black text-theme-primary leading-tight">${toCurr(s.total)}</p>
                    </div>`).join('')}
                </div>`;
            requestAnimationFrame(() => {
                const ctx = document.getElementById('sumCanvas').getContext('2d');
                if (chartInstance) chartInstance.destroy();
                chartInstance = new Chart(ctx, {
                    type: 'line', data: { labels: stats.map(s => s.ym.split('-')[1]+'/'+s.ym.split('-')[0].substring(2)),
                        datasets: [{ data: stats.map(s => s.total), borderColor: getComputedStyle(document.documentElement).getPropertyValue('--primary').trim(),
                            borderWidth: 3, backgroundColor: 'rgba(0,0,0,0.01)', fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#fff' }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, grid: { color: '#f8fafc' }, ticks: { font: {size: 8}, callback: v => '฿' + v.toLocaleString() } },
                                  x: { grid: { display: false }, ticks: { font: {size: 8} } } } }
                });
            });
        }

        // --- FORM LOGIC ---
        window.renderModal = (t, h) => { document.getElementById('modal-inner').innerHTML = `<h3 class="text-lg font-bold mb-4 text-slate-800">${t}</h3>${h}`; document.getElementById('modal-screen').classList.remove('hidden'); };
        window.closeModal = () => document.getElementById('modal-screen').classList.add('hidden');

        window.openCardForm = () => {
            renderModal('เพิ่มบัตรใหม่', `<div class="space-y-3">
                <input id="in-n" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm" placeholder="ชื่อบัตร">
                <input id="in-l" type="number" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm" placeholder="วงเงินรวม">
                <input id="in-d" type="number" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm" placeholder="วันตัดยอด (1-31)">
                <button onclick="commitCard()" class="w-full py-3 bg-theme-primary text-white rounded-xl font-bold shadow-md mt-2 text-sm uppercase">บันทึกข้อมูล</button></div>`);
        };
        window.commitCard = () => {
            const n = document.getElementById('in-n').value, l = document.getElementById('in-l').value, d = document.getElementById('in-d').value;
            if(!n || !l || !d) return alert('กรอกข้อมูลให้ครบนะคะ');
            appState.cards.push({ id: Date.now().toString(), name: n, limit: Number(l), date: Number(d) });
            forceSave(); closeModal(); updateUI();
        };

        window.editCard = (id) => {
            const c = appState.cards.find(x => x.id === id);
            renderModal('แก้ไขบัตร', `<div class="space-y-3">
                <input id="in-n" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm" value="${c.name}">
                <input id="in-l" type="number" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm" value="${c.limit}">
                <input id="in-d" type="number" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm" value="${c.date}">
                <button onclick="updateCard('${id}')" class="w-full py-3 bg-theme-primary text-white rounded-xl font-bold shadow-md mt-2 text-sm uppercase">อัปเดตข้อมูล</button></div>`);
        };
        window.updateCard = (id) => {
            const n = document.getElementById('in-n').value, l = document.getElementById('in-l').value, d = document.getElementById('in-d').value;
            const idx = appState.cards.findIndex(x => x.id === id);
            if(idx !== -1) { appState.cards[idx] = { ...appState.cards[idx], name: n, limit: Number(l), date: Number(d) }; forceSave(); closeModal(); updateUI(); }
        };

        window.openBudgetForm = (sid) => {
            if(!sid) {
                renderModal('แก้งบประมาณ', `<div class="space-y-3">
                    <select id="s-id" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm">${appState.cards.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select>
                    <input id="in-bl" type="number" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm" placeholder="วงเงินใหม่">
                    <button onclick="updBud(document.getElementById('s-id').value)" class="w-full py-3 bg-theme-primary text-white rounded-xl font-bold shadow-md mt-2 text-sm uppercase">ยืนยัน</button></div>`);
                return;
            }
            const c = appState.cards.find(x => x.id === sid);
            renderModal('ปรับวงเงิน', `<div class="space-y-3">
                <input id="in-bl" type="number" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm" value="${c.limit}">
                <button onclick="updBud('${sid}')" class="w-full py-3 bg-theme-primary text-white rounded-xl font-bold shadow-md mt-2 text-sm uppercase">ยืนยัน</button></div>`);
        };
        window.updBud = (id) => {
            const l = document.getElementById('in-bl').value; const idx = appState.cards.findIndex(x => x.id === id);
            if(idx !== -1) { appState.cards[idx].limit = Number(l); forceSave(); closeModal(); updateUI(); }
        };

        window.openInstForm = () => {
            if(appState.cards.length === 0) return alert('เพิ่มบัตรก่อนค่ะ');
            renderModal('เพิ่มรายการผ่อน', `<div class="space-y-3">
                <select id="in-cid" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm">${appState.cards.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select>
                <input id="in-item" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm" placeholder="ชื่อสินค้า">
                <div class="flex gap-3"><input id="in-s" type="month" class="flex-1 p-3 bg-slate-50 rounded-xl outline-none text-sm"><input id="in-dr" type="number" class="w-20 p-3 bg-slate-50 rounded-xl outline-none text-sm" placeholder="งวด"></div>
                <input id="in-a" type="number" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm" placeholder="ยอดต่อเดือน">
                <button onclick="commitInst()" class="w-full py-3 bg-theme-primary text-white rounded-xl font-bold shadow-md mt-2 text-sm uppercase">บันทึก</button></div>`);
        };
        window.commitInst = () => {
            const cid = document.getElementById('in-cid').value, n = document.getElementById('in-item').value, s = document.getElementById('in-s').value, d = document.getElementById('in-dr').value, a = document.getElementById('in-a').value;
            if(!n || !s || !d || !a) return alert('ข้อมูลไม่ครบนะคะ');
            appState.installments.push({ id: Date.now().toString(), cardId: cid, name: n, startMonth: s, duration: Number(d), amount: Number(a) });
            forceSave(); closeModal(); updateUI();
        };

        window.delCard = (id) => { if(confirm("ลบบัตรนี้รายการผ่อนจะหายไปด้วย ยืนยันไหม?")) { appState.cards = appState.cards.filter(x => x.id !== id); appState.installments = appState.installments.filter(x => x.cardId !== id); forceSave(); updateUI(); } };
        window.delInst = (id) => { if(confirm("ลบรายการนี้ไหมคะ?")) { appState.installments = appState.installments.filter(x => x.id !== id); forceSave(); updateUI(); } };

        window.openNotifications = () => {
            const today = new Date().getDate();
            const list = appState.cards.map(c => {
                const diff = c.date - today;
                if (diff >= 0 && diff <= 3) return { t: 'ใกล้ตัดรอบ', x: `บัตร ${c.name} ตัดรอบใน ${diff === 0 ? 'วันนี้' : diff + ' วัน'}`, i: 'fa-clock' };
                return null;
            }).filter(x => x !== null);
            let html = `<div class="space-y-3">${list.length === 0 ? '<p class="text-center text-slate-400 py-6 text-sm">ไม่มีแจ้งเตือนใหม่ค่ะ</p>' : list.map(n => `<div class="p-3.5 rounded-2xl bg-slate-50 border border-slate-100 flex gap-3 items-center"><div class="w-9 h-9 rounded-full bg-white flex items-center justify-center text-orange-500 shadow-sm shrink-0"><i class="fa-solid ${n.i} text-sm"></i></div><div><p class="text-xs font-bold text-slate-800">${n.t}</p><p class="text-[10px] text-slate-500 mt-0.5">${n.x}</p></div></div>`).join('')}</div>`;
            renderModal('การแจ้งเตือน', html);
        };

        function updateNotifBadge() {
            const count = appState.cards.filter(c => {
                const diff = c.date - new Date().getDate();
                return diff >= 0 && diff <= 3;
            }).length;
            const b = document.getElementById('notif-badge');
            if (b) { if (count > 0) { b.innerText = count; b.classList.remove('hidden'); } else b.classList.add('hidden'); }
        }

        window.onload = startApp;
    </script>
</body>
</html>
