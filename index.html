<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meetang - Smart Tracker</title>
    
    <!-- Dependencies (Tailwind, Chart.js, FontAwesome) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --primary: #f97316;
            --primary-light: #fff7ed;
        }
        
        body { 
            font-family: 'Kanit', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc;
            color: #0f172a;
        }
        
        .text-theme-primary { color: var(--primary); }
        .bg-theme-primary { background-color: var(--primary); }
        .border-theme-primary { border-color: var(--primary); }
        
        .tab-active { color: var(--primary); transform: scale(1.05); transition: all 0.3s; } 
        .tab-inactive { color: #94a3b8; }
        
        .card-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .weather-gradient { background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); }
        .ai-gradient { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }
        
        .safe-pb { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 100px); }
        
        /* Modals & Animations */
        .bottom-sheet { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .logo-btn:active { transform: scale(0.9); }
        
        /* Save Status Banner */
        #save-banner { transition: all 0.3s ease; max-height: 0; opacity: 0; overflow: hidden; }
        #save-banner.visible { max-height: 40px; opacity: 1; margin-top: 8px; padding: 4px 16px; }

        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="min-h-screen relative">

    <!-- Header Section -->
    <header class="bg-white/90 backdrop-blur-md px-6 py-4 sticky top-0 z-40 flex flex-col shadow-sm border-b border-slate-100">
        <div class="flex justify-between items-center w-full">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-theme-primary rounded-2xl flex items-center justify-center text-white shadow-lg shadow-orange-200">
                    <i class="fa-solid fa-cat text-xl"></i>
                </div>
                <div class="flex flex-col">
                    <h1 class="text-lg font-black text-slate-800 leading-none tracking-tight">MEETANG</h1>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Smart Tracker 🔒</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="showSettingsMenu()" class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:text-theme-primary transition-colors">
                    <i class="fa-solid fa-gear text-sm"></i>
                </button>
                <button onclick="showNotifs()" class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 relative hover:text-theme-primary transition-all">
                    <i class="fa-solid fa-bell text-sm"></i>
                    <div id="notif-dot" class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full hidden border-2 border-white"></div>
                </button>
            </div>
        </div>
        
        <!-- Status Banner -->
        <div id="save-banner" class="flex items-center justify-center gap-2 bg-emerald-50 rounded-full mx-auto border border-emerald-100">
            <span id="save-icon-box"><i class="fa-solid fa-check text-[10px] text-emerald-500"></i></span>
            <span id="save-msg" class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">บันทึกลงเครื่องเรียบร้อย</span>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="p-5 max-w-md mx-auto w-full safe-pb" id="view-container">
        <div class="flex flex-col items-center justify-center py-40">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-theme-primary"></i>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest animate-pulse">กำลังโหลดข้อมูล...</p>
        </div>
    </main>

    <!-- Modal Overlay -->
    <div id="modal-overlay" onclick="if(event.target.id === 'modal-overlay') closeModal()" class="fixed inset-0 bg-slate-900/60 z-50 hidden flex flex-col justify-end backdrop-blur-sm">
        <div class="bg-white w-full max-w-md mx-auto rounded-t-[2.5rem] p-6 bottom-sheet shadow-2xl relative max-h-[85vh] overflow-y-auto">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6" onclick="closeModal()"></div>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-5 left-5 right-5 h-[72px] bg-white border border-slate-100 rounded-3xl shadow-xl shadow-slate-200/50 flex justify-around items-center px-2 z-40 max-w-md mx-auto">
        <button onclick="switchTab('home')" id="tab-home" class="flex flex-col items-center justify-center w-full h-full space-y-1.5 text-slate-400">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[8px] font-bold uppercase tracking-wider">หน้าหลัก</span>
        </button>
        <button onclick="switchTab('cards')" id="tab-cards" class="flex flex-col items-center justify-center w-full h-full space-y-1.5 text-slate-400">
            <i class="fa-solid fa-credit-card text-xl"></i>
            <span class="text-[8px] font-bold uppercase tracking-wider">บัตร</span>
        </button>
        <button onclick="switchTab('installments')" id="tab-installments" class="flex flex-col items-center justify-center w-full h-full space-y-1.5 text-slate-400">
            <i class="fa-solid fa-calendar-check text-xl"></i>
            <span class="text-[8px] font-bold uppercase tracking-wider">ผ่อน</span>
        </button>
        <button onclick="switchTab('summary')" id="tab-summary" class="flex flex-col items-center justify-center w-full h-full space-y-1.5 text-slate-400">
            <i class="fa-solid fa-chart-pie text-xl"></i>
            <span class="text-[8px] font-bold uppercase tracking-wider">วิเคราะห์</span>
        </button>
    </nav>

    <!-- Hidden Input for File Upload -->
    <input type="file" id="importFile" class="hidden" accept=".txt,.json" onchange="importData(event)">

    <script>
        // --- GEMINI API ENGINE ---
        const apiKey = ""; // Execution environment injects API key here

        async function fetchGeminiAPI(prompt, expectJson = false) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { 
                    parts: [{ text: "You are 'Kae' (เก๋), a friendly, expert Thai financial advisor assistant inside an app named Meetang. Reply briefly and naturally in Thai. Use emojis to make it engaging." }] 
                }
            };
            if (expectJson) {
                payload.generationConfig = { responseMimeType: "application/json" };
            }

            const delays = [1000, 2000, 4000, 8000, 16000];
            let attempt = 0;

            while (attempt < 5) {
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    return expectJson ? JSON.parse(text) : text;
                } catch (error) {
                    if (attempt === 4) {
                        console.error("Gemini API Failed after retries:", error);
                        return null;
                    }
                    await new Promise(r => setTimeout(r, delays[attempt]));
                    attempt++;
                }
            }
        }

        // --- GLOBAL STATE ---
        let state = {
            cards: [],
            installments: [],
            tab: 'home',
            theme: { color: '#f97316' },
            weather: { temp: '--', condition: 'กำลังโหลด...', pm25: '--', location: 'พิกัดปัจจุบัน' },
            settings: { enableNotif: true },
            lastBackup: ''
        };

        const DB_KEY = 'MEETANG_OFFLINE_V2';
        let chartInstance, saveTimeout;

        // --- INITIALIZATION ---
        function run() {
            // Load from Device LocalStorage
            const local = localStorage.getItem(DB_KEY);
            if(local) {
                try {
                    const parsed = JSON.parse(local);
                    state.cards = parsed.cards || [];
                    state.installments = parsed.installments || [];
                    if(parsed.theme) state.theme = parsed.theme;
                    if(parsed.settings !== undefined) state.settings = parsed.settings;
                    if(parsed.lastBackup !== undefined) state.lastBackup = parsed.lastBackup;
                    
                    applyTheme(state.theme.color);
                } catch(e) { console.error("Error parsing local data", e); }
            }
            
            // Get Realtime Weather (Independent of storage)
            fetchWeather();
            
            // Render UI immediately
            renderViewport();
        }

        // --- OFFLINE SAVE SYSTEM ---
        function forceSave() {
            // Save to device storage instantly
            localStorage.setItem(DB_KEY, JSON.stringify({
                cards: state.cards,
                installments: state.installments,
                theme: state.theme,
                settings: state.settings,
                lastBackup: state.lastBackup
            }));
            
            // Show Save Success Banner momentarily
            showSaveBanner();
        }

        function showSaveBanner() {
            const banner = document.getElementById('save-banner');
            banner.classList.add('visible');
            if(saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                banner.classList.remove('visible');
            }, 2000);
        }

        // --- EXPORT & IMPORT DATA (BACKUP TO TXT) ---
        window.exportData = () => {
            const dataStr = JSON.stringify({
                cards: state.cards,
                installments: state.installments,
                theme: state.theme,
                settings: state.settings,
                lastBackup: state.lastBackup
            }, null, 2);
            const blob = new Blob([dataStr], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `meetang_backup_${new Date().toISOString().slice(0,10)}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // Update last backup status
            state.lastBackup = 'เซฟเมื่อ ' + new Date().toLocaleString('th-TH', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
            forceSave();
            if(state.tab === 'home') renderViewport();
        };

        window.importData = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const parsed = JSON.parse(evt.target.result);
                    if(parsed.cards !== undefined && parsed.installments !== undefined) {
                        state.cards = parsed.cards;
                        state.installments = parsed.installments;
                        if(parsed.theme) state.theme = parsed.theme;
                        if(parsed.settings !== undefined) state.settings = parsed.settings;
                        
                        state.lastBackup = 'โหลดเมื่อ ' + new Date().toLocaleString('th-TH', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                        
                        forceSave();
                        applyTheme(state.theme.color);
                        renderViewport();
                        closeModal();
                        alert("กู้คืนข้อมูลสำเร็จแล้วค่ะ!");
                    } else {
                        alert("ไฟล์ไม่ถูกต้อง หรือข้อมูลไม่ครบถ้วนค่ะ");
                    }
                } catch(err) {
                    alert("เกิดข้อผิดพลาดในการอ่านไฟล์ค่ะ");
                }
            };
            reader.readAsText(file);
            // Reset input so the same file can be selected again if needed
            e.target.value = '';
        };

        // --- WEATHER API ---
        function fetchWeather() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    try {
                        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code&air_quality=pm2_5`);
                        const data = await res.json();
                        const pmRes = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${latitude}&longitude=${longitude}&current=pm2_5`);
                        const pmData = await pmRes.json();

                        state.weather = {
                            temp: data.current.temperature_2m.toFixed(1),
                            condition: getWeatherCodeDesc(data.current.weather_code),
                            pm25: pmData.current.pm2_5.toFixed(0),
                            location: 'พิกัดของคุณ'
                        };
                        if(state.tab === 'home') renderViewport();
                    } catch (e) { console.error('Weather error', e); }
                }, (err) => {
                    console.warn("Location denied");
                    state.weather.condition = "ไม่ทราบพิกัด";
                    if(state.tab === 'home') renderViewport();
                });
            }
        }

        function getWeatherCodeDesc(code) {
            if (code === 0) return 'ฟ้าโปร่งแจ่มใส';
            if (code <= 3) return 'มีเมฆบางส่วน';
            if (code >= 45 && code <= 48) return 'มีหมอกบางๆ';
            if (code >= 51 && code <= 67) return 'มีฝนตกปรอยๆ';
            if (code >= 80) return 'ฝนตกหนัก';
            return 'อากาศเปลี่ยนแปลง';
        }

        function getPMColor(val) {
            if(val === '--') return 'text-slate-200';
            const v = Number(val);
            if (v <= 25) return 'text-emerald-400';
            if (v <= 50) return 'text-yellow-400';
            return 'text-rose-400';
        }

        function applyTheme(c) {
            document.documentElement.style.setProperty('--primary', c);
            state.theme.color = c;
        }

        // --- NAVIGATION & TABS ---
        window.switchTab = (t) => {
            state.tab = t;
            const tabs = ['home', 'cards', 'installments', 'summary'];
            tabs.forEach(item => {
                const b = document.getElementById(`tab-${item}`);
                if(b) {
                    if(t === item) {
                        b.classList.add('tab-active');
                        b.classList.remove('tab-inactive');
                    } else {
                        b.classList.remove('tab-active');
                        b.classList.add('tab-inactive');
                    }
                }
            });
            renderViewport();
        };

        // --- RENDER ENGINE ---
        function renderViewport() {
            const container = document.getElementById('view-container');
            if(!container) return;
            
            // Check Notifications
            updateNotifs();
            
            container.innerHTML = '';
            const t = state.tab;

            if (t === 'home') {
                renderHome(container);
            } else if (t === 'cards') {
                renderCards(container);
            } else if (t === 'installments') {
                renderInstallments(container);
            } else if (t === 'summary') {
                renderSummary(container);
            }
        }

        // --- VIEWS ---
        function renderHome(container) {
            // Calculate Current Month Total
            const today = new Date();
            const thisYm = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
            const currentMonthTotal = state.installments.reduce((sum, item) => {
                const start = item.startMonth;
                const end = shiftMonthStr(item.startMonth, item.dur - 1);
                if (thisYm >= start && thisYm <= end) return sum + item.amount;
                return sum;
            }, 0);

            // Determine generic greeting based on time
            const hour = today.getHours();
            let greeting = 'สวัสดีค่ะ';
            if(hour < 12) greeting = 'อรุณสวัสดิ์ค่ะ';
            else if(hour < 18) greeting = 'สวัสดีตอนบ่ายค่ะ';
            else greeting = 'สวัสดีตอนค่ำค่ะ';

            // Generate Alert Card based on settings
            let alertCardHtml = '';
            if (state.settings.enableNotif) {
                const day = today.getDate();
                const urgentCards = state.cards.filter(c => {
                    const diff = c.date - day;
                    return diff >= 0 && diff <= 3;
                });
                
                const alertText = urgentCards.length > 0 ? `บัตร ${urgentCards[0].name}` : 'ยังไม่มีดิวใกล้ชำระ';
                const alertColor = urgentCards.length > 0 ? 'rose' : 'orange';
                
                alertCardHtml = `
                    <div class="bg-${alertColor}-50 p-4 rounded-3xl border border-${alertColor}-100/50">
                        <i class="fa-solid fa-clock text-${alertColor}-500 mb-3 text-lg"></i>
                        <p class="text-[9px] font-bold text-${alertColor}-600/80 uppercase tracking-widest mb-1">บัตรใกล้ตัดรอบ</p>
                        <p class="text-sm font-bold text-slate-800 truncate">${alertText}</p>
                    </div>
                `;
            } else {
                alertCardHtml = `
                    <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100/50">
                        <i class="fa-solid fa-bell-slash text-slate-400 mb-3 text-lg"></i>
                        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">แจ้งเตือน</p>
                        <p class="text-sm font-bold text-slate-400">ปิดการแจ้งเตือน</p>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="space-y-5 fade-in">
                    
                    <!-- Greeting -->
                    <div class="px-2 pt-2">
                        <h2 class="text-2xl font-black text-slate-800 tracking-tight">${greeting} ✨</h2>
                        <p class="text-xs font-bold text-slate-500 mt-1">พร้อมจัดการการเงินของวันนี้หรือยังคะ?</p>
                    </div>

                    <!-- Weather Widget -->
                    <div class="weather-gradient p-6 rounded-3xl text-white shadow-xl shadow-blue-200/50 relative overflow-hidden">
                        <div class="flex justify-between items-start mb-6 relative z-10">
                            <div>
                                <p class="text-[10px] font-bold text-blue-200 flex items-center gap-1 uppercase tracking-widest"><i class="fa-solid fa-location-dot"></i> ${state.weather.location}</p>
                                <h3 class="text-5xl font-black mt-2 tracking-tighter">${state.weather.temp}°<span class="text-2xl text-blue-200">C</span></h3>
                            </div>
                            <i class="fa-solid fa-sun text-4xl text-yellow-300 drop-shadow-md animate-[spin_10s_linear_infinite]"></i>
                        </div>
                        <div class="flex justify-between items-center bg-white/20 p-3.5 rounded-2xl backdrop-blur-md relative z-10 border border-white/10">
                            <div class="flex items-center gap-2.5">
                                <i class="fa-solid fa-wind text-blue-100"></i>
                                <span class="text-xs font-bold text-blue-50">ฝุ่น PM 2.5: <span class="text-sm font-black ${getPMColor(state.weather.pm25)} bg-slate-900/40 px-2 py-0.5 rounded-lg ml-1">${state.weather.pm25}</span></span>
                            </div>
                            <span class="text-[10px] font-bold text-white uppercase tracking-widest">${state.weather.condition}</span>
                        </div>
                        <!-- Decoration -->
                        <i class="fa-solid fa-cloud absolute -bottom-4 -right-4 text-7xl text-white/10"></i>
                    </div>

                    <!-- Quick Insight -->
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-theme-primary/10 rounded-2xl flex items-center justify-center text-theme-primary">
                                <i class="fa-solid fa-wallet text-xl"></i>
                            </div>
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">ยอดต้องจ่ายเดือนนี้</p>
                                <p class="text-2xl font-black text-slate-800">${toCurr(currentMonthTotal)}</p>
                            </div>
                        </div>
                        <button onclick="switchTab('summary')" class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:text-theme-primary hover:bg-theme-primary/10 transition-colors">
                            <i class="fa-solid fa-chevron-right text-xs"></i>
                        </button>
                    </div>

                    <!-- Mini Alerts -->
                    <div class="grid grid-cols-2 gap-4">
                        ${alertCardHtml}
                        <div class="bg-emerald-50 p-4 rounded-3xl border border-emerald-100/50">
                            <i class="fa-solid fa-folder-open text-emerald-500 mb-3 text-lg"></i>
                            <p class="text-[9px] font-bold text-emerald-600/80 uppercase tracking-widest mb-1">สถานะแฟ้มข้อมูล</p>
                            <p class="text-[10px] font-bold text-slate-800 leading-tight">${state.lastBackup || 'ยังไม่เคยสร้างไฟล์'}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCards(container) {
            container.innerHTML = `
                <div class="fade-in space-y-4">
                    <div class="flex justify-between items-center px-1 mb-2">
                        <h2 class="text-lg font-black text-slate-800">บัตรเครดิต</h2>
                        <button onclick="openCardForm()" class="bg-theme-primary text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg shadow-orange-200/50 active:scale-90 transition-transform"><i class="fa-solid fa-plus text-sm"></i></button>
                    </div>

                    ${state.cards.length === 0 ? `
                        <div class="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                            <i class="fa-solid fa-credit-card text-4xl text-slate-200 mb-3"></i>
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">เพิ่มบัตรใบแรกเพื่อเริ่มใช้งานค่ะ</p>
                        </div>
                    ` : state.cards.map(c => {
                        const used = state.installments.filter(i => i.cardId === c.id).reduce((sum, i) => sum + i.amount, 0);
                        const pct = Math.min((used / c.limit) * 100, 100);
                        return `
                            <div class="card-gradient p-6 rounded-[2rem] text-white shadow-xl relative overflow-hidden group">
                                <div class="flex justify-between items-start relative z-10 mb-6">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-sm"><i class="fa-solid fa-microchip text-xs text-white/70"></i></div>
                                        <h3 class="font-black text-xl tracking-wide">${c.name}</h3>
                                    </div>
                                    <div class="flex gap-2">
                                        <button onclick="editCard('${c.id}')" class="w-7 h-7 bg-white/10 rounded-full flex items-center justify-center text-[10px] hover:bg-theme-primary transition-colors"><i class="fa-solid fa-pen"></i></button>

        function renderInstallments(container) {
            // Calculate Current Month Total
            const today = new Date();
            const thisYm = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
            const currentMonthTotal = state.installments.reduce((sum, item) => {
                const start = item.startMonth;
                const end = shiftMonthStr(item.startMonth, item.dur - 1);
                if (thisYm >= start && thisYm <= end) return sum + item.amount;
                return sum;
            }, 0);

            container.innerHTML = `
                <div class="fade-in space-y-4">
                    <div class="flex justify-between items-center px-1 mb-2">
                        <h2 class="text-lg font-black text-slate-800">รายการผ่อนชำระ</h2>
                        <button onclick="openInstForm()" class="bg-theme-primary text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg shadow-orange-200/50 active:scale-90 transition-transform"><i class="fa-solid fa-plus text-sm"></i></button>
                    </div>

                    <!-- ยอดรวมการผ่อนเดือนนี้ -->
                    <div class="bg-theme-primary/10 p-5 rounded-[2rem] border border-theme-primary/20 flex justify-between items-center shadow-sm">
                        <div>
                            <p class="text-[10px] font-bold text-theme-primary uppercase tracking-widest mb-0.5"><i class="fa-solid fa-calendar-day mr-1.5"></i>ยอดผ่อนเดือนปัจจุบัน</p>
                            <p class="text-3xl font-black text-theme-primary">${toCurr(currentMonthTotal)}</p>
                        </div>
                        <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-theme-primary shadow-sm">
                            <i class="fa-solid fa-receipt text-xl"></i>
                        </div>
                    </div>

                    ${state.installments.length === 0 ? `
                        <div class="text-center py-10 bg-white rounded-3xl border border-slate-100">
                            <i class="fa-solid fa-cart-shopping text-4xl text-slate-200 mb-3"></i>
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">ยังไม่มีรายการผ่อนค่ะ</p>
                        </div>
                    ` : `
                        <div class="space-y-3">
                            ${state.installments.map(i => {
                                const card = state.cards.find(c => c.id === i.cardId);
                                return `
                                    <div class="bg-white p-4.5 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center group">
                                        <div class="flex items-center gap-4">
                                            <div class="w-11 h-11 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 shrink-0 group-hover:bg-theme-primary/10 group-hover:text-theme-primary transition-colors">
                                                <i class="fa-solid fa-box-open text-sm"></i>
                                            </div>
                                            <div>
                                                <h4 class="font-black text-slate-800 text-sm leading-tight">${i.name}</h4>
                                                <p class="text-[9px] font-bold text-slate-400 mt-1 tracking-wider uppercase"><i class="fa-regular fa-credit-card mr-1"></i>${card?.name || '-'} | เริ่ม ${i.startMonth}</p>
                                            </div>
                                        </div>
                                        <div class="text-right">
                                            <p class="text-sm font-black text-theme-primary">${toCurr(i.amount)}</p>
                                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">${i.dur} งวด</p>
                                            <div class="flex justify-end gap-3 mt-1.5">
                                                <button onclick="editInst('${i.id}')" class="text-[9px] font-bold text-slate-400 hover:text-theme-primary uppercase tracking-widest transition-colors">แก้ไข</button>
                                                <button onclick="delInst('${i.id}')" class="text-[9px] font-bold text-red-400 hover:text-red-600 uppercase tracking-widest transition-colors">ลบ</button>
                                            </div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `}
                </div>
            `;
        }

        function renderSummary(container) {
            if(state.installments.length === 0) {
                container.innerHTML = `<div class="py-32 text-center text-slate-300 text-xs font-bold uppercase tracking-widest">เพิ่มรายการผ่อนเพื่อดูข้อมูลค่ะ</div>`;
                return;
            }

            let first = state.installments[0].startMonth;
            let last = '0000-00';
            state.installments.forEach(i => {
                if(i.startMonth < first) first = i.startMonth;
                const end = shiftMonthStr(i.startMonth, i.dur-1); 
                if(end > last) last = end;
            });

            const stats = []; 
            let cur = first;
            while(cur <= last && stats.length < 36) {
                let s = 0; 
                state.installments.forEach(i => {
                    const e = shiftMonthStr(i.startMonth, i.dur-1); 
                    if(cur >= i.startMonth && cur <= e) s += i.amount;
                });
                stats.push({ ym: cur, total: s }); 
                cur = shiftMonthStr(cur, 1);
            }

            container.innerHTML = `
                <div class="fade-in space-y-5">
                    <h2 class="text-lg font-black text-slate-800 px-1">วิเคราะห์แผนการเงิน</h2>
                    
                    <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                        <div class="h-56 w-full"><canvas id="sumChart"></canvas></div>
                    </div>
                    
                    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                        <div class="p-4 bg-slate-50/50 flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100">
                            <span>ประจำเดือน</span>
                            <span>ยอดจ่ายรวม</span>
                        </div>
                        <div class="divide-y divide-slate-50">
                            ${stats.map(s => `
                                <div class="p-5 flex justify-between items-center hover:bg-slate-50 transition-colors">
                                    <div>
                                        <p class="text-sm font-black text-slate-800">${formatThaiMonth(s.ym)}</p>
                                    </div>
                                    <p class="text-sm font-black text-theme-primary">${toCurr(s.total)}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <!-- AI Advisor Button -->
                    <button onclick="askAIAdvisor()" class="w-full py-4 mt-2 ai-gradient text-white rounded-3xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-indigo-200 relative overflow-hidden active:scale-95 transition-transform">
                        <div class="absolute inset-0 shimmer"></div>
                        <i class="fa-solid fa-wand-magic-sparkles relative z-10"></i> 
                        <span class="relative z-10">ให้ AI เก๋ ช่วยวิเคราะห์การเงิน</span>
                    </button>
                </div>
            `;

            // Draw Chart
            setTimeout(() => {
                const canvas = document.getElementById('sumChart');
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                if(chartInstance) chartInstance.destroy();
                
                const themeColor = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
                
                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: stats.map(s => {
                            const [y, m] = s.ym.split('-');
                            const mName = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][parseInt(m)-1];
                            return `${mName} ${y.slice(2)}`;
                        }),
                        datasets: [{
                            data: stats.map(s => s.total),
                            backgroundColor: themeColor,
                            borderRadius: 6,
                            barThickness: 16
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { display: false, beginAtZero: true },
                            x: { grid: { display: false }, ticks: { font: { family: 'Kanit', size: 9 }, color: '#94a3b8' }, border: {display: false} }
                        },
                        animation: { duration: 1000, easing: 'easeOutQuart' }
                    }
                });
            }, 100);
        }

        // --- HELPERS ---
        const toCurr = (v) => '฿' + Number(v).toLocaleString(undefined, {minimumFractionDigits: 0});
        
        function formatThaiMonth(ym) {
            const m = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
            const [y, mm] = ym.split('-'); 
            return `${m[parseInt(mm)-1]} ${y}`;
        }
        
        function shiftMonthStr(ym, n) {
            const [y, m] = ym.split('-').map(Number);
            const d = new Date(y, m - 1 + n, 1);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        }

        // --- AI ADVISOR ---
        window.askAIAdvisor = async () => {
            if(state.installments.length === 0 && state.cards.length === 0) {
                return alert('เบนซ์ต้องเพิ่มข้อมูลบัตรหรือรายการผ่อนก่อนนะคะ เก๋ถึงจะวิเคราะห์ให้ได้ค่ะ 😅');
            }

            openModal('✨ ผู้ช่วย AI วิเคราะห์การเงิน', `
                <div class="py-10 flex flex-col items-center justify-center text-indigo-500">
                    <i class="fa-solid fa-wand-magic-sparkles text-5xl animate-bounce mb-4"></i>
                    <p class="text-sm font-bold animate-pulse text-center mt-2">เก๋กำลังประมวลผลข้อมูลการเงิน<br>ให้เบนซ์อยู่นะคะ รอแป๊บนึงน้า...</p>
                </div>
            `);

            const totalDebt = state.installments.reduce((sum, i) => sum + (i.amount * i.dur), 0);
            const today = new Date();
            const thisYm = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
            const thisMonthPay = state.installments.reduce((sum, item) => {
                const start = item.startMonth;
                const end = shiftMonthStr(item.startMonth, item.dur - 1);
                if (thisYm >= start && thisYm <= end) return sum + item.amount;
                return sum;
            }, 0);

            const prompt = `
                คุณคือ "เก๋" ผู้ช่วยส่วนตัวทางการเงินที่เชี่ยวชาญและเป็นกันเอง คุยเหมือนเพื่อนสนิทกับผู้ใช้ชื่อ "เบนซ์"
                ข้อมูลการเงินของเบนซ์ตอนนี้:
                - มีบัตรเครดิต ${state.cards.length} ใบ
                - มีรายการผ่อนชำระ ${state.installments.length} รายการ
                - ยอดที่ต้องจ่ายเฉพาะเดือนนี้ประมาณ ${thisMonthPay} บาท
                - ยอดหนี้คงค้างทั้งหมดประมาณ ${totalDebt} บาท

                ช่วยวิเคราะห์สั้นๆ กระชับ เป็นกันเอง (ไม่เกิน 4-5 บรรทัด) ว่าสถานะทางการเงินตอนนี้เป็นอย่างไร ให้กำลังใจ และแนะนำทริคการเงินหรือสุขภาพนิดหน่อยค่ะ (เช่น เตือนเรื่องดื่มน้ำ พักผ่อน หรือทานอาหารเสริมสุขภาพของแอมเวย์เพื่อดูแลตัวเอง)
            `;

            const response = await fetchGeminiAPI(prompt);

            if(response) {
                const formattedResponse = response.replace(/\n/g, '<br>');
                openModal('✨ คำแนะนำจาก AI เก๋', `
                    <div class="space-y-4">
                        <div class="p-5 bg-indigo-50 rounded-3xl border border-indigo-100 text-sm text-slate-700 leading-relaxed font-medium">
                            ${formattedResponse}
                        </div>
                        <button onclick="closeModal()" class="w-full py-4 bg-theme-primary text-white rounded-2xl font-bold uppercase tracking-widest text-sm shadow-lg shadow-orange-200 mt-2 active:scale-95 transition-transform">ขอบคุณจ้า ปิดเลย</button>
                    </div>
                `);
            } else {
                openModal('❌ เกิดข้อผิดพลาด', `
                    <div class="text-center py-6">
                        <p class="text-slate-500 text-sm font-bold">ขออภัยค่ะ ระบบ AI ขัดข้องชั่วคราว ลองใหม่อีกครั้งนะคะ</p>
                        <button onclick="closeModal()" class="mt-6 px-8 py-3 bg-slate-200 rounded-xl font-bold text-slate-600 active:scale-95 transition-transform">ปิดหน้าต่าง</button>
                    </div>
                `);
            }
        };

        // --- MODALS & FORMS ---
        window.closeModal = () => document.getElementById('modal-overlay').classList.add('hidden');
        function openModal(t, h) {
            document.getElementById('modal-content').innerHTML = `<h3 class="text-xl font-black mb-5 text-slate-800">${t}</h3>${h}`;
            document.getElementById('modal-overlay').classList.remove('hidden');
        }

        // Cards Form
        window.openCardForm = () => {
            openModal('เพิ่มบัตรเครดิต', `
                <div class="space-y-4">
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">ชื่อบัตร</label><input id="in-n" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1" placeholder="เช่น KBank, SCB"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">วงเงินรวม (บาท)</label><input id="in-l" type="number" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1" placeholder="ระบุตัวเลข"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">วันตัดรอบ (วันที่)</label><input id="in-d" type="number" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1" placeholder="1-31"></div>
                    <button onclick="commitCard()" class="w-full py-4 bg-theme-primary text-white rounded-2xl font-bold uppercase tracking-widest text-sm shadow-lg shadow-orange-200 mt-2 active:scale-95 transition-transform">บันทึกข้อมูล</button>
                </div>
            `);
        };
        window.commitCard = () => {
            const n = document.getElementById('in-n').value, l = document.getElementById('in-l').value, d = document.getElementById('in-d').value;
            if(!n || !l || !d) return alert('กรอกข้อมูลให้ครบนะคะ');
            state.cards.push({ id: Date.now().toString(), name: n, limit: Number(l), date: Number(d) });
            closeModal(); renderViewport(); forceSave();
        };

        window.editCard = (id) => {
            const c = state.cards.find(x => x.id === id);
            openModal('แก้ไขบัตร', `
                <div class="space-y-4">
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">ชื่อบัตร</label><input id="in-n" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1" value="${c.name}"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">วงเงินรวม (บาท)</label><input id="in-l" type="number" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1" value="${c.limit}"></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">วันตัดรอบ (วันที่)</label><input id="in-d" type="number" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1" value="${c.date}"></div>
                    <button onclick="updateCard('${id}')" class="w-full py-4 bg-theme-primary text-white rounded-2xl font-bold uppercase tracking-widest text-sm shadow-lg shadow-orange-200 mt-2 active:scale-95 transition-transform">อัปเดตข้อมูล</button>
                </div>
            `);
        };
        window.updateCard = (id) => {
            const idx = state.cards.findIndex(x => x.id === id);
            state.cards[idx] = { ...state.cards[idx], name: document.getElementById('in-n').value, limit: Number(document.getElementById('in-l').value), date: Number(document.getElementById('in-d').value) };
            closeModal(); renderViewport(); forceSave();
        };

        // Installment Form
        window.openInstForm = () => {
            if(state.cards.length === 0) return alert('รบกวนเพิ่มบัตรก่อนใช้งานนะคะ');
            openModal('เพิ่มรายการผ่อน', `
                <div class="space-y-4">
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">เลือกบัตร</label><select id="in-cid" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1 appearance-none">${state.cards.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">ชื่อสินค้า/รายการ</label><input id="in-item" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1" placeholder="เช่น เครื่องฟอกอากาศ"></div>
                    <div class="flex gap-3">
                        <div class="flex-1"><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">เริ่มงวดแรก</label><input id="in-s" type="month" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1 w-full"></div>
                        <div class="w-24"><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">จำนวนงวด</label><input id="in-dr" type="number" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1" placeholder="10"></div>
                    </div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">ยอดจ่ายต่อเดือน (บาท)</label><input id="in-a" type="number" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1" placeholder="ระบุตัวเลข"></div>
                    <button onclick="commitInst()" class="w-full py-4 bg-theme-primary text-white rounded-2xl font-bold uppercase tracking-widest text-sm shadow-lg shadow-orange-200 mt-2 active:scale-95 transition-transform">บันทึกรายการ</button>
                </div>
            `);
        };
        window.commitInst = () => {
            const cid = document.getElementById('in-cid').value, n = document.getElementById('in-item').value, s = document.getElementById('in-s').value, d = document.getElementById('in-dr').value, a = document.getElementById('in-a').value;
            if(!n || !s || !d || !a) return alert('ใส่ข้อมูลให้ครบด้วยนะคะ');
            state.installments.push({ id: Date.now().toString(), cardId: cid, name: n, startMonth: s, dur: Number(d), amount: Number(a) });
            closeModal(); renderViewport(); forceSave();
        };

        window.editInst = (id) => {
            const inst = state.installments.find(x => x.id === id);
            if(!inst) return;
            openModal('แก้ไขรายการผ่อน', `
                <div class="space-y-4">
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">เลือกบัตร</label><select id="in-cid" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1 appearance-none">${state.cards.map(c => `<option value="${c.id}" ${c.id === inst.cardId ? 'selected' : ''}>${c.name}</option>`).join('')}</select></div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">ชื่อสินค้า/รายการ</label><input id="in-item" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1" value="${inst.name}"></div>
                    <div class="flex gap-3">
                        <div class="flex-1"><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">เริ่มงวดแรก</label><input id="in-s" type="month" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1 w-full" value="${inst.startMonth}"></div>
                        <div class="w-24"><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">จำนวนงวด</label><input id="in-dr" type="number" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1" value="${inst.dur}"></div>
                    </div>
                    <div><label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">ยอดจ่ายต่อเดือน (บาท)</label><input id="in-a" type="number" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm font-bold mt-1" value="${inst.amount}"></div>
                    <button onclick="updateInst('${id}')" class="w-full py-4 bg-theme-primary text-white rounded-2xl font-bold uppercase tracking-widest text-sm shadow-lg shadow-orange-200 mt-2 active:scale-95 transition-transform">อัปเดตรายการ</button>
                </div>
            `);
        };

        window.updateInst = (id) => {
            const cid = document.getElementById('in-cid').value, n = document.getElementById('in-item').value, s = document.getElementById('in-s').value, d = document.getElementById('in-dr').value, a = document.getElementById('in-a').value;
            if(!n || !s || !d || !a) return alert('ใส่ข้อมูลให้ครบด้วยนะคะ');
            
            const idx = state.installments.findIndex(x => x.id === id);
            if (idx !== -1) {
                state.installments[idx] = { ...state.installments[idx], cardId: cid, name: n, startMonth: s, dur: Number(d), amount: Number(a) };
                closeModal(); renderViewport(); forceSave();
            }
        };

        // Deletes
        window.delCard = (id) => { if(confirm("ลบบัตรนี้รายการผ่อนจะหายเกลี้ยงเลยนะคะ ยืนยันไหม?")) { state.cards = state.cards.filter(x => x.id !== id); state.installments = state.installments.filter(x => x.cardId !== id); renderViewport(); forceSave(); } };
        window.delInst = (id) => { if(confirm("ลบรายการผ่อนนี้นะคะ?")) { state.installments = state.installments.filter(x => x.id !== id); renderViewport(); forceSave(); } };

        // --- SETTINGS & BACKUP ---
        window.showSettingsMenu = () => {
            openModal('ตั้งค่าแอปพลิเคชัน', `
                <div class="space-y-6">
                    <!-- Notifications Toggle -->
                    <div>
                        <h4 class="text-sm font-bold text-slate-800 mb-3">การแจ้งเตือน</h4>
                        <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <div>
                                <p class="text-xs font-bold text-slate-700">เตือนวันชำระบัตรเครดิต</p>
                                <p class="text-[9px] text-slate-400 mt-0.5">แจ้งเตือนล่วงหน้า 3 วันก่อนวันตัดรอบ</p>
                            </div>
                            <button onclick="toggleNotif()" class="w-12 h-6 rounded-full transition-colors relative shadow-inner ${state.settings.enableNotif ? 'bg-emerald-500' : 'bg-slate-300'}">
                                <div class="w-5 h-5 bg-white rounded-full absolute top-0.5 transition-all shadow-sm ${state.settings.enableNotif ? 'right-0.5' : 'left-0.5'}"></div>
                            </button>
                        </div>
                    </div>

                    <hr class="border-slate-100">

                    <!-- Themes -->
                    <div>
                        <h4 class="text-sm font-bold text-slate-800 mb-3">เปลี่ยนสีสันของแอป</h4>
                        <div class="grid grid-cols-3 gap-3">
                            ${[
                                {c: '#f97316', n: 'Orange'}, {c: '#3b82f6', n: 'Blue'}, {c: '#10b981', n: 'Green'}, 
                                {c: '#8b5cf6', n: 'Purple'}, {c: '#f43f5e', n: 'Rose'}, {c: '#0f172a', n: 'Dark'}
                            ].map(t => `
                                <button onclick="setTheme('${t.c}')" class="h-16 rounded-2xl shadow-sm border-2 ${state.theme.color === t.c ? 'border-slate-800 scale-95' : 'border-transparent'} flex flex-col items-center justify-center gap-1.5 transition-all" style="background-color: ${t.c}10">
                                    <div class="w-5 h-5 rounded-full" style="background-color: ${t.c}"></div>
                                    <span class="text-[9px] font-bold text-slate-600 uppercase">${t.n}</span>
                                </button>
                            `).join('')}
                        </div>
                    </div>

                    <hr class="border-slate-100">

                    <!-- Backup / Restore -->
                    <div>
                        <h4 class="text-sm font-bold text-slate-800 mb-1">จัดการข้อมูล (Backup)</h4>
                        <p class="text-[10px] text-slate-400 mb-3">ข้อมูลถูกบันทึกในเครื่อง หากต้องการเปลี่ยนเครื่อง กรุณาเซฟเป็นไฟล์เก็บไว้ค่ะ</p>
                        <div class="flex gap-2">
                            <button onclick="exportData()" class="flex-1 p-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold text-slate-600 hover:bg-theme-primary/10 hover:text-theme-primary transition-colors flex items-center justify-center gap-2">
                                <i class="fa-solid fa-download"></i> เซฟเป็นไฟล์
                            </button>
                            <button onclick="document.getElementById('importFile').click()" class="flex-1 p-3.5 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-bold text-slate-600 hover:bg-theme-primary/10 hover:text-theme-primary transition-colors flex items-center justify-center gap-2">
                                <i class="fa-solid fa-upload"></i> โหลดจากไฟล์
                            </button>
                        </div>
                    </div>
                    
                    <button onclick="closeModal()" class="w-full py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold uppercase tracking-widest text-sm mt-4 active:scale-95 transition-transform">ปิดหน้าต่างนี้</button>
                </div>
            `);
        };
        
        window.setTheme = (c) => { applyTheme(c); forceSave(); closeModal(); renderViewport(); };
        
        window.toggleNotif = () => { 
            state.settings.enableNotif = !state.settings.enableNotif; 
            forceSave(); 
            showSettingsMenu(); // Refresh the settings modal
            renderViewport();   // Refresh the home screen alerts
        };

        // --- NOTIFICATIONS ---
        window.showNotifs = () => {
            if(!state.settings.enableNotif) {
                openModal('การแจ้งเตือน', `<p class="text-center text-slate-400 py-8 text-xs font-bold uppercase tracking-widest">คุณได้ปิดการแจ้งเตือนไว้ค่ะ 🔕</p>`);
                return;
            }

            const today = new Date().getDate();
            const list = state.cards.filter(c => {
                const diff = c.date - today;
                return diff >= 0 && diff <= 3;
            });
            openModal('การแจ้งเตือน', `
                <div class="space-y-3">
                    ${list.length === 0 ? '<p class="text-center text-slate-400 py-8 text-xs font-bold uppercase tracking-widest">ยังไม่มีเรื่องด่วนค่ะ ✌️</p>' : list.map(c => `
                        <div class="p-4 rounded-2xl bg-slate-50 flex items-center gap-4 border border-slate-100">
                            <div class="w-10 h-10 bg-theme-primary/10 rounded-full flex items-center justify-center text-theme-primary"><i class="fa-solid fa-clock"></i></div>
                            <div>
                                <p class="text-sm font-black text-slate-800">บัตร ${c.name}</p>
                                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-0.5">ตัดรอบใน ${c.date - today === 0 ? 'วันนี้!' : 'อีก ' + (c.date - today) + ' วัน'}</p>
                            </div>
                        </div>
                    `).join('')}
                    
                    <button onclick="closeModal()" class="w-full py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold uppercase tracking-widest text-sm mt-4 active:scale-95 transition-transform">ปิดหน้าต่างนี้</button>
                </div>
            `);
        };
        
        function updateNotifs() {
            const dot = document.getElementById('notif-dot');
            if(!dot) return;
            
            if(!state.settings.enableNotif) {
                dot.classList.add('hidden');
                return;
            }

            const today = new Date().getDate();
            const has = state.cards.some(c => (c.date - today) >= 0 && (c.date - today) <= 3);
            if(has) dot.classList.remove('hidden'); else dot.classList.add('hidden');
        }

        // Start Application
        window.onload = run;
    </script>
</body>
</html>
