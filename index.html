<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Meetang - Smart Tracker</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f97316">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap');
    :root { --primary: #f97316; --primary-light: #fff7ed; }

    * { box-sizing: border-box; }

    body {
      font-family: 'Kanit', sans-serif;
      -webkit-tap-highlight-color: transparent;
      background-color: #f1f5f9;
      color: #0f172a;
      overscroll-behavior: none;
    }

    /* ── Theme helpers ── */
    .text-theme-primary  { color: var(--primary); }
    .bg-theme-primary    { background-color: var(--primary); }
    .border-theme-primary{ border-color: var(--primary); }
    .shadow-theme        { box-shadow: 0 8px 24px color-mix(in srgb, var(--primary) 30%, transparent); }

    /* ── Gradients ── */
    .card-gradient    { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    .weather-gradient { background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); }
    .ai-gradient      { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }
    .gold-gradient    { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); }
    .stock-gradient   { background: linear-gradient(135deg, #2bb0ff 0%, #0077d6 100%); }

    /* ── Layout ── */
    #app-wrapper {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* Sticky header */
    #app-header {
      flex-shrink: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid #f1f5f9;
      z-index: 40;
    }

    /* Scrollable content area — ends at nav */
    #view-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 20px 16px;
      padding-bottom: 24px; /* inner breathing room; nav is outside */
    }

    /* Fixed bottom nav — OUTSIDE scroll area */
    #bottom-nav {
      flex-shrink: 0;
      height: 72px;
      background: #ffffff;
      border-top: 1px solid #f1f5f9;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
      z-index: 40;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex: 1;
      height: 100%;
      color: #94a3b8;
      transition: color 0.2s, transform 0.2s;
      position: relative;
    }
    .nav-btn .nav-icon { font-size: 18px; }
    .nav-btn .nav-label { font-size: 9px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
    .nav-btn.active { color: var(--primary); }
    .nav-btn.active::before {
      content: '';
      position: absolute;
      top: 0; left: 25%; right: 25%;
      height: 2.5px;
      background: var(--primary);
      border-radius: 0 0 4px 4px;
    }
    .nav-btn:active { transform: scale(0.88); }

    /* ── Animations ── */
    .fade-in {
      animation: fadeIn 0.35s ease-out both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .slide-up {
      animation: slideUp 0.32s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    /* ── Save banner ── */
    #save-banner {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: all 0.3s ease;
    }
    #save-banner.visible {
      max-height: 36px; opacity: 1;
      margin-top: 6px; padding: 3px 14px;
    }

    /* ── Modal ── */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.55);
      z-index: 60;
      display: none;
      flex-direction: column;
      justify-content: flex-end;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    #modal-overlay.open { display: flex; }
    #modal-box {
      background: #fff;
      width: 100%; max-width: 430px;
      margin: 0 auto;
      border-radius: 2rem 2rem 0 0;
      padding: 20px 24px 32px;
      padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
      max-height: 90dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .modal-drag { width: 44px; height: 5px; background: #e2e8f0; border-radius: 99px; margin: 0 auto 20px; }

    /* ── Cards & Items ── */
    .item-card {
      background: #fff;
      border-radius: 20px;
      border: 1px solid #f1f5f9;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .item-card:active { transform: scale(0.98); transition: transform 0.1s; }

    /* ── Inputs ── */
    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      outline: none;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Kanit', sans-serif;
      transition: border-color 0.2s;
    }
    .input-field:focus { border-color: var(--primary); background: #fff; }

    /* ── Pill toggle ── */
    .pill-group { display: flex; background: #f1f5f9; border-radius: 14px; padding: 4px; gap: 4px; }
    .pill-group label { flex: 1; }
    .pill-group label input[type="radio"] { display: none; }
    .pill-opt {
      display: block; text-align: center;
      padding: 9px 4px;
      border-radius: 10px;
      font-size: 11px; font-weight: 700;
      color: #94a3b8;
      transition: all 0.2s;
      cursor: pointer;
    }
    .pill-group label input:checked + .pill-opt {
      background: #fff;
      color: #1e293b;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* ── Shimmer ── */
    .shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

    /* ── Progress bar ── */
    .progress-track { width: 100%; height: 5px; background: rgba(255,255,255,0.15); border-radius: 99px; overflow: hidden; }
    .progress-fill  { height: 100%; background: var(--primary); border-radius: 99px; transition: width 1s ease; }

    /* ── Scrollbar hide ── */
    #view-container::-webkit-scrollbar { display: none; }
    #view-container { scrollbar-width: none; }
    #modal-box::-webkit-scrollbar { display: none; }

    /* ── FAB ── */
    .fab {
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      box-shadow: 0 6px 20px color-mix(in srgb, var(--primary) 35%, transparent);
      transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.88); }

    /* ── Section header ── */
    .section-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .section-head h2 { font-size: 20px; font-weight: 900; color: #1e293b; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      background: #fff;
      border-radius: 24px;
      border: 2px dashed #e2e8f0;
    }
    .empty-state i { font-size: 36px; color: #cbd5e1; margin-bottom: 12px; display: block; }
    .empty-state p { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; }

    /* ── Summary table ── */
    .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; }
    .summary-row + .summary-row { border-top: 1px solid #f8fafc; }
  </style>
</head>

<body>
<div id="app-wrapper">

  <!-- ══ HEADER ══ -->
  <header id="app-header" class="px-5 pt-4 pb-3">
    <div class="flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-theme-primary rounded-[14px] flex items-center justify-center text-white shadow-theme">
          <i class="fa-solid fa-cat text-lg"></i>
        </div>
        <div>
          <h1 class="text-[17px] font-black text-slate-800 leading-none tracking-tight">MEETANG</h1>
          <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Smart Tracker 🔒</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="showSettingsMenu()" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 hover:text-theme-primary transition-colors">
          <i class="fa-solid fa-gear text-sm"></i>
        </button>
        <button onclick="showNotifs()" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 relative hover:text-theme-primary transition-all">
          <i class="fa-solid fa-bell text-sm"></i>
          <div id="notif-dot" class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full hidden border-2 border-white"></div>
        </button>
      </div>
    </div>
    <div id="save-banner" class="flex items-center justify-center gap-2 bg-emerald-50 rounded-full mx-auto border border-emerald-100">
      <i class="fa-solid fa-check text-[10px] text-emerald-500"></i>
      <span class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">บันทึกเรียบร้อยแล้วค่ะ</span>
    </div>
  </header>

  <!-- ══ SCROLLABLE CONTENT ══ -->
  <main id="view-container">
    <div class="flex flex-col items-center justify-center py-32 fade-in">
      <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-theme-primary"></i>
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest animate-pulse">กำลังโหลด...</p>
    </div>
  </main>

  <!-- ══ BOTTOM NAV — outside scroll ══ -->
  <nav id="bottom-nav">
    <button class="nav-btn active" id="tab-home" onclick="switchTab('home')">
      <i class="fa-solid fa-house nav-icon"></i>
      <span class="nav-label">หน้าหลัก</span>
    </button>
    <button class="nav-btn" id="tab-cards" onclick="switchTab('cards')">
      <i class="fa-solid fa-credit-card nav-icon"></i>
      <span class="nav-label">บัตร</span>
    </button>
    <button class="nav-btn" id="tab-installments" onclick="switchTab('installments')">
      <i class="fa-solid fa-calendar-check nav-icon"></i>
      <span class="nav-label">ผ่อน</span>
    </button>
    <button class="nav-btn" id="tab-invest" onclick="switchTab('invest')">
      <i class="fa-solid fa-arrow-trend-up nav-icon"></i>
      <span class="nav-label">ลงทุน</span>
    </button>
    <button class="nav-btn" id="tab-summary" onclick="switchTab('summary')">
      <i class="fa-solid fa-chart-pie nav-icon"></i>
      <span class="nav-label">วิเคราะห์</span>
    </button>
  </nav>

</div><!-- end #app-wrapper -->

<!-- ══ MODAL ══ -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box" class="slide-up">
    <div class="modal-drag" onclick="closeModal()"></div>
    <div id="modal-content"></div>
  </div>
</div>

<input type="file" id="importFile" class="hidden" accept=".txt,.json,.zip" onchange="importData(event)">

<script>
/* ═══════════════════════════════════════════
   STATE & PERSISTENCE
═══════════════════════════════════════════ */
const DB_KEY = 'MEETANG_OFFLINE_V8';
let chartInstance, saveTimeout;

let state = {
  cards: [], installments: [], gold: [], stocks: [], marketPrices: {},
  tab: 'home', investSubTab: 'stocks',
  theme: { color: '#f97316' },
  weather: { temp: '--', condition: 'กำลังโหลด...', pm25: '--', location: 'พิกัดปัจจุบัน' },
  settings: { enableNotif: true, usdRate: 36.5 },
  lastBackup: ''
};

const apiKey = "";

/* ─ Formatters ─ */
const toCurr = (v, currency = 'THB') => Number(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

function formatThaiMonth(ym) {
  const m = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const [y, mm] = ym.split('-');
  return `${m[parseInt(mm)-1]} ${y}`;
}

function shiftMonthStr(ym, n) {
  const [y, mo] = ym.split('-').map(Number);
  const d = new Date(y, mo - 1 + n, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

/* ─ Boot ─ */
function run() {
  let local = localStorage.getItem(DB_KEY) || localStorage.getItem('MEETANG_OFFLINE_V7') || localStorage.getItem('MEETANG_OFFLINE_V6');
  if (local) {
    try {
      const p = JSON.parse(local);
      state.cards        = p.cards        || [];
      state.installments = p.installments || [];
      state.gold         = p.gold         || [];
      state.stocks       = p.stocks       || [];
      state.marketPrices = p.marketPrices || {};
      if (p.theme)    state.theme    = p.theme;
      if (p.settings) { state.settings = p.settings; if (!state.settings.usdRate) state.settings.usdRate = 36.5; }
      if (p.lastBackup !== undefined) state.lastBackup = p.lastBackup;
      applyTheme(state.theme.color);
    } catch(e) { console.error(e); }
  }
  fetchWeather();
  renderViewport();
}

function forceSave() {
  localStorage.setItem(DB_KEY, JSON.stringify({
    cards: state.cards, installments: state.installments, gold: state.gold,
    stocks: state.stocks, marketPrices: state.marketPrices,
    theme: state.theme, settings: state.settings, lastBackup: state.lastBackup
  }));
  showSaveBanner();
}

function showSaveBanner() {
  const b = document.getElementById('save-banner');
  b.classList.add('visible');
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => b.classList.remove('visible'), 2200);
}

/* ─ Theme ─ */
function applyTheme(c) {
  document.documentElement.style.setProperty('--primary', c);
  state.theme.color = c;
}

/* ─ Tab switching ─ */
window.switchTab = (t) => {
  state.tab = t;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`tab-${t}`);
  if (btn) btn.classList.add('active');
  renderViewport();
};

window.switchInvestSubTab = (s) => { state.investSubTab = s; renderViewport(); };

/* ─ Modal ─ */
window.closeModal = () => {
  const o = document.getElementById('modal-overlay');
  o.classList.remove('open');
};
function openModal(title, body) {
  document.getElementById('modal-content').innerHTML =
    `<h3 class="text-xl font-black mb-5 text-slate-800 leading-tight">${title}</h3>${body}`;
  const o = document.getElementById('modal-overlay');
  const box = document.getElementById('modal-box');
  box.classList.remove('slide-up');
  void box.offsetWidth;
  box.classList.add('slide-up');
  o.classList.add('open');
}

/* ─ Notif dot ─ */
function updateNotifs() {
  const dot = document.getElementById('notif-dot'); if (!dot) return;
  if (!state.settings.enableNotif) { dot.classList.add('hidden'); return; }
  const today = new Date().getDate();
  const has = state.cards.some(c => (c.date - today) >= 0 && (c.date - today) <= 3);
  if (has) dot.classList.remove('hidden'); else dot.classList.add('hidden');
}

/* ─ Render router ─ */
function renderViewport() {
  const c = document.getElementById('view-container');
  if (!c) return;
  updateNotifs();
  c.innerHTML = '';
  c.scrollTop = 0;
  if      (state.tab === 'home')         renderHome(c);
  else if (state.tab === 'cards')        renderCards(c);
  else if (state.tab === 'installments') renderInstallments(c);
  else if (state.tab === 'invest')       renderInvest(c);
  else if (state.tab === 'summary')      renderSummary(c);
}

/* ═══════════════════════════════════════════
   WEATHER
═══════════════════════════════════════════ */
function fetchWeather() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const { latitude: lat, longitude: lon } = pos.coords;
    try {
      const [wRes, pmRes] = await Promise.all([
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code`),
        fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=pm2_5`)
      ]);
      const [wData, pmData] = await Promise.all([wRes.json(), pmRes.json()]);
      state.weather = {
        temp: wData.current.temperature_2m.toFixed(1),
        condition: getWeatherDesc(wData.current.weather_code),
        pm25: pmData.current.pm2_5.toFixed(0),
        location: 'พิกัดปัจจุบัน'
      };
    } catch(e) { state.weather.condition = 'ไม่สามารถโหลดได้'; }
    if (state.tab === 'home') renderViewport();
  }, () => {
    state.weather.condition = 'ไม่ได้รับอนุญาต';
    if (state.tab === 'home') renderViewport();
  });
}

function getWeatherDesc(code) {
  if (code === 0) return 'ท้องฟ้าแจ่มใส ☀️';
  if (code <= 3)  return 'มีเมฆบางส่วน ⛅';
  if (code <= 48) return 'หมอกลง 🌫️';
  if (code <= 67) return 'ฝนตก 🌧️';
  if (code <= 77) return 'หิมะตก ❄️';
  if (code <= 99) return 'พายุฝนฟ้าคะนอง ⛈️';
  return 'อากาศแปรปรวน';
}

function getPMBadge(val) {
  const n = Number(val);
  if (isNaN(n)) return { color: 'text-slate-300', label: '--', bg: 'bg-slate-900/30' };
  if (n <= 25)  return { color: 'text-emerald-300', label: 'ดี', bg: 'bg-emerald-500/30' };
  if (n <= 50)  return { color: 'text-yellow-300',  label: 'ปานกลาง', bg: 'bg-yellow-500/30' };
  if (n <= 100) return { color: 'text-orange-300',  label: 'เริ่มมีผล', bg: 'bg-orange-500/30' };
  return { color: 'text-red-300', label: 'อันตราย', bg: 'bg-red-500/30' };
}

/* ═══════════════════════════════════════════
   PAGE: HOME
═══════════════════════════════════════════ */
function renderHome(container) {
  const today = new Date();
  const thisYm = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const currentMonthTotal = state.installments.reduce((sum, item) => {
    const end = shiftMonthStr(item.startMonth, item.dur - 1);
    return (thisYm >= item.startMonth && thisYm <= end) ? sum + item.amount : sum;
  }, 0);

  const pm = getPMBadge(state.weather.pm25);
  const day = today.getDate();
  const urgentCards = state.settings.enableNotif ? state.cards.filter(c => { const d = c.date - day; return d >= 0 && d <= 3; }) : [];

  let alertHtml = '';
  if (state.settings.enableNotif) {
    if (urgentCards.length > 0) {
      alertHtml = `
        <div class="item-card p-4 flex items-center gap-4 border-rose-100" style="border-color:#ffe4e6">
          <div class="w-11 h-11 bg-rose-50 rounded-2xl flex items-center justify-center text-rose-500 shrink-0">
            <i class="fa-solid fa-clock text-base"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[10px] font-bold text-rose-400 uppercase tracking-widest">ใกล้ตัดรอบ</p>
            <p class="text-sm font-black text-slate-800 truncate">${urgentCards.map(c => c.name).join(', ')}</p>
          </div>
          <span class="text-[10px] font-bold text-rose-500 bg-rose-50 px-2.5 py-1 rounded-full shrink-0">
            ${urgentCards[0].date - day === 0 ? 'วันนี้!' : `อีก ${urgentCards[0].date - day} วัน`}
          </span>
        </div>`;
    } else {
      alertHtml = `
        <div class="item-card p-4 flex items-center gap-4">
          <div class="w-11 h-11 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500 shrink-0">
            <i class="fa-solid fa-circle-check text-base"></i>
          </div>
          <div>
            <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">ตรวจสอบบัตรแล้ว</p>
            <p class="text-sm font-black text-slate-700">ยังไม่มีดิวใกล้ชำระค่ะ 👍</p>
          </div>
        </div>`;
    }
  }

  /* quick-access rows */
  const totalCards = state.cards.length;
  const totalInst  = state.installments.length;
  const totalStocks = [...new Set(state.stocks.map(s => s.symbol))].length;

  container.innerHTML = `
    <div class="space-y-4 fade-in">

      <!-- greeting -->
      <div class="pt-1">
        <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">${getGreeting()}</p>

function quickStat(icon, tc, bg, val, label, onclick) {
  return `
    <button onclick="${onclick}" class="item-card p-4 text-center hover:bg-slate-50 transition-colors active:scale-95">
      <div class="w-10 h-10 ${bg} ${tc} rounded-2xl flex items-center justify-center mx-auto mb-2">
        <i class="fa-solid ${icon} text-base"></i>
      </div>
      <p class="text-xl font-black text-slate-800">${val}</p>
      <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-tight mt-0.5">${label}</p>
    </button>`;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'สวัสดีตอนเช้า ☀️';
  if (h < 18) return 'สวัสดีตอนบ่าย 🌤️';
  return 'สวัสดีตอนเย็น 🌙';
}

function renderInstallments(container) {
  const today = new Date();
  const thisYm = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const currentMonthTotal = state.installments.reduce((sum, i) => {
    const end = shiftMonthStr(i.startMonth, i.dur - 1);
    return (thisYm >= i.startMonth && thisYm <= end) ? sum + i.amount : sum;
  }, 0);

  /* calculate remaining installments */
  const enriched = state.installments.map(i => {
    const end = shiftMonthStr(i.startMonth, i.dur - 1);
    const isActive = thisYm >= i.startMonth && thisYm <= end;
    const [sy, sm] = i.startMonth.split('-').map(Number);
    const [ty, tm] = thisYm.split('-').map(Number);
    const elapsed = Math.max(0, (ty - sy) * 12 + (tm - sm));
    const remaining = Math.max(0, i.dur - elapsed);
    return { ...i, isActive, remaining, end };
  });

  const active   = enriched.filter(i => i.isActive);
  const inactive = enriched.filter(i => !i.isActive);

  container.innerHTML = `
    <div class="space-y-4 fade-in">
      <div class="section-head">
        <h2>รายการผ่อนชำระ</h2>
        <button onclick="openInstForm()" class="fab bg-theme-primary text-white">
          <i class="fa-solid fa-plus"></i>
        </button>
      </div>

      <!-- month summary hero -->
      <div class="bg-theme-primary p-5 rounded-3xl text-white relative overflow-hidden shadow-theme">
        <div class="relative z-10 flex justify-between items-center">
          <div>
            <p class="text-[9px] font-bold text-white/70 uppercase tracking-widest mb-1">
              <i class="fa-solid fa-calendar-day mr-1"></i>ยอดผ่อนเดือนนี้
            </p>
            <p class="text-4xl font-black tracking-tight">฿${toCurr(currentMonthTotal)}</p>
            <p class="text-[10px] text-white/60 mt-1">${active.length} รายการที่กำลังผ่อนอยู่</p>
          </div>
          <div class="w-14 h-14 bg-white/15 rounded-2xl flex items-center justify-center">
            <i class="fa-solid fa-receipt text-2xl text-white/80"></i>
          </div>
        </div>
        <i class="fa-solid fa-wave-square absolute -bottom-4 -right-4 text-[80px] text-white/8"></i>
      </div>

      ${enriched.length === 0
        ? `<div class="empty-state"><i class="fa-solid fa-cart-shopping"></i><p>ยังไม่มีรายการผ่อนค่ะ</p></div>`
        : `
          ${active.length > 0 ? `
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">กำลังผ่อนอยู่ (${active.length})</p>
            <div class="space-y-3">
              ${active.map(i => instCard(i, true)).join('')}
            </div>
          ` : ''}

          ${inactive.length > 0 ? `
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1 mt-2">รายการอื่น ๆ (${inactive.length})</p>
            <div class="space-y-3">
              ${inactive.map(i => instCard(i, false)).join('')}
            </div>
          ` : ''}
        `}
    </div>`;
}

function instCard(i, isActive) {

  return `
    <div class="item-card p-4">
      <div class="flex justify-between items-start mb-3">
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <div class="w-10 h-10 ${isActive ? 'bg-theme-primary/10 text-theme-primary' : 'bg-slate-100 text-slate-400'} rounded-xl flex items-center justify-center shrink-0">
            <i class="fa-solid fa-box-open text-sm"></i>
          </div>
          <div class="min-w-0">
            <h4 class="font-black text-slate-800 text-sm truncate">${i.name}</h4>
            <p class="text-[9px] font-bold text-slate-400 mt-0.5 uppercase tracking-wider">
              <i class="fa-regular fa-credit-card mr-1"></i>${card?.name || '–'} · เริ่ม ${i.startMonth}
            </p>
          </div>
        </div>
        <div class="text-right shrink-0 ml-3">
          <p class="text-base font-black text-theme-primary">฿${toCurr(i.amount)}</p>
          <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${isActive ? `เหลือ ${i.remaining} งวด` : `${i.dur} งวด`}</p>
        </div>
      </div>
      ${isActive ? `
        <div class="mb-3">
          <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
            <div class="h-full bg-theme-primary rounded-full transition-all duration-700" style="width:${pct}%"></div>
          </div>
          <div class="flex justify-between text-[8px] font-bold text-slate-300 mt-1">
            <span>ผ่านมา ${i.dur - i.remaining}/${i.dur} งวด</span><span>${pct}%</span>

      ` : ''}
      <div class="flex gap-4 justify-end">
        <button onclick="editInst('${i.id}')" class="text-[10px] font-bold text-slate-400 hover:text-theme-primary uppercase tracking-widest transition-colors">แก้ไข</button>
        <button onclick="delInst('${i.id}')" class="text-[10px] font-bold text-red-400 hover:text-red-600 uppercase tracking-widest transition-colors">ลบ</button>
      </div>

}

function renderInvest(container) {
  const isGold  = state.investSubTab === 'gold';
  const usdRate = state.settings.usdRate || 36.5;

  let html = `
    <div class="space-y-4 fade-in">
      <div class="section-head">
        <h2>พอร์ตลงทุน</h2>
        <button onclick="${isGold ? 'openGoldForm()' : 'openStockForm()'}"
          class="fab text-white ${isGold ? 'gold-gradient' : 'bg-blue-500'}" style="${isGold ? 'box-shadow:0 6px 20px rgba(251,191,36,0.4)' : 'box-shadow:0 6px 20px rgba(59,130,246,0.4)'}">
          <i class="fa-solid fa-plus"></i>
        </button>
      </div>

      <!-- sub-tab -->
      <div class="pill-group">
        <label>
          <input type="radio" name="investTab" value="stocks" ${!isGold?'checked':''} onchange="switchInvestSubTab('stocks')">
          <span class="pill-opt"><i class="fa-solid fa-chart-line mr-1"></i>หุ้น / กองทุน</span>
        </label>
        <label>
          <input type="radio" name="investTab" value="gold" ${isGold?'checked':''} onchange="switchInvestSubTab('gold')">
          <span class="pill-opt"><i class="fa-solid fa-coins mr-1"></i>ทองคำ</span>
        </label>
      </div>`;

  if (isGold) {
    let totalWeight = 0, totalInvestment = 0;
    state.gold.forEach(g => {
      if (g.type === 'buy')  { totalWeight += g.weight; totalInvestment += g.weight * g.price; }
      else if (g.type === 'sell') { totalWeight -= g.weight; totalInvestment -= g.weight * g.price; }
    });
    const sorted = [...state.gold].sort((a,b) => new Date(b.date)-new Date(a.date));

    html += `
      <div class="gold-gradient p-5 rounded-3xl text-white shadow-lg shadow-yellow-300/30 relative overflow-hidden">
        <div class="relative z-10 flex justify-between items-start mb-4">
          <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center">
            <i class="fa-solid fa-coins text-lg"></i>
          </div>
          <span class="text-[9px] font-bold uppercase tracking-widest bg-white/20 px-3 py-1 rounded-full">สินทรัพย์มั่นคง</span>
        </div>
        <div class="relative z-10">
          <p class="text-[9px] font-bold text-white/60 uppercase tracking-widest mb-1">น้ำหนักทองรวม</p>
          <p class="text-4xl font-black">${totalWeight.toFixed(2)} <span class="text-lg font-semibold text-yellow-100">บาท</span></p>
          <div class="mt-4 pt-4 border-t border-white/20 flex justify-between items-end">
            <div>
              <p class="text-[8px] font-bold text-white/60 uppercase tracking-widest mb-0.5">เงินลงทุนสุทธิ</p>
              <p class="text-base font-bold">฿${toCurr(totalInvestment)}</p>
            </div>
            <div class="text-right">
              <p class="text-[8px] font-bold text-white/60 uppercase tracking-widest mb-0.5">ต้นทุนเฉลี่ย/บาท</p>
              <p class="text-sm font-bold text-yellow-100">${totalWeight > 0 ? '฿'+toCurr(totalInvestment/totalWeight) : '—'}</p>
            </div>
          </div>
        </div>
        <i class="fa-solid fa-vault absolute -bottom-6 -right-4 text-[90px] text-white/8"></i>
      </div>

      <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">ประวัติทำรายการ</p>
      ${sorted.length === 0
        ? `<div class="empty-state"><i class="fa-solid fa-piggy-bank"></i><p>ยังไม่มีรายการทองคำค่ะ</p></div>`
        : `<div class="space-y-3">${sorted.map(g => `
            <div class="item-card p-4 flex justify-between items-center">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 ${g.type==='buy'?'bg-emerald-50 text-emerald-500':'bg-rose-50 text-rose-500'} rounded-xl flex items-center justify-center shrink-0">
                  <i class="fa-solid ${g.type==='buy'?'fa-arrow-down':'fa-arrow-up'} text-sm"></i>
                </div>
                <div>
                  <p class="text-sm font-black text-slate-800">${g.type==='buy'?'ซื้อทองคำ':'ขายทองคำ'}</p>
                  <p class="text-[9px] font-bold text-slate-400 mt-0.5 uppercase tracking-wider">${g.date}</p>
                </div>
              </div>
              <div class="text-right">
                <p class="text-sm font-black ${g.type==='buy'?'text-emerald-500':'text-rose-500'}">${g.type==='buy'?'+':'-'}${g.weight} บาท</p>
                <p class="text-[9px] font-bold text-slate-400 mt-0.5">@ ฿${toCurr(g.price)}/บาท</p>
                <div class="flex justify-end gap-3 mt-1.5">
                  <button onclick="editGold('${g.id}')" class="text-[9px] font-bold text-slate-400 hover:text-theme-primary uppercase tracking-widest">แก้ไข</button>
                  <button onclick="delGold('${g.id}')" class="text-[9px] font-bold text-red-400 hover:text-red-600 uppercase tracking-widest">ลบ</button>
                </div>
              </div>
            </div>`).join('')}</div>`}`;

  } else {
    /* STOCKS */
    let totalInTHB = 0, totalOutTHB = 0;
    let currentShares = {}, currentInvested = {}, currentCurrency = {};

    state.stocks.forEach(s => {
      const rate = s.currency === 'USD' ? usdRate : 1;
      const val  = (s.type === 'dividend' ? s.price : s.shares * s.price) * rate;
      if (!currentShares[s.symbol]) { currentShares[s.symbol] = 0; currentInvested[s.symbol] = 0; currentCurrency[s.symbol] = s.currency || 'THB'; }
      if (s.type === 'buy') { totalInTHB += val; currentShares[s.symbol] += s.shares; currentInvested[s.symbol] += val; }
      else if (s.type === 'sell') {
        totalOutTHB += val;
        if (currentShares[s.symbol] > 0) {
          const prop = s.shares / currentShares[s.symbol];
          currentShares[s.symbol] -= s.shares;
          currentInvested[s.symbol] -= currentInvested[s.symbol] * prop;
        }
      } else if (s.type === 'dividend') { totalOutTHB += val; }
    });

    let totalCurrentValueTHB = 0;
    let activeStocksHTML = '';

    Object.keys(currentShares).forEach(sym => {
      if (currentShares[sym] > 0) {
        const cCurr = currentCurrency[sym];
        const rate  = cCurr === 'USD' ? usdRate : 1;
        const avgCostTHB  = currentInvested[sym] / currentShares[sym];
        const avgCostOrig = avgCostTHB / rate;
        let mktPrice  = state.marketPrices[sym];
        const hasPrice = !!mktPrice;
        if (!mktPrice) mktPrice = avgCostOrig;
        const currValTHB = currentShares[sym] * mktPrice * rate;
        totalCurrentValueTHB += currValTHB;
        const sym2 = cCurr === 'USD' ? '$' : '฿';

        activeStocksHTML += `
          <button onclick="openMarketPriceForm('${sym}','${cCurr}')" class="w-full bg-white/10 rounded-2xl p-3.5 flex justify-between items-center hover:bg-white/20 transition-colors active:scale-98 text-left">
            <div>
              <p class="text-base font-black text-white">${sym}</p>
              <p class="text-[9px] font-bold ${hasPrice?'text-emerald-300':'text-yellow-300'} mt-0.5">
                <i class="fa-solid ${hasPrice?'fa-check-circle':'fa-pen-to-square'} mr-1"></i>${hasPrice?'อัปเดตแล้ว':'แตะเพื่ออัปเดตราคา'}
              </p>
            </div>
            <div class="text-right">
              <p class="text-sm font-bold text-white">${currentShares[sym].toFixed(4)} หุ้น</p>
              <p class="text-[9px] text-white/70">${sym2}${toCurr(avgCostOrig)} avg</p>
            </div>
          </button>`;
      }
    });

    const profitLoss = (totalCurrentValueTHB + totalOutTHB) - totalInTHB;
    const profitPct  = totalInTHB > 0 ? (profitLoss / totalInTHB) * 100 : 0;
    const isProfit   = profitLoss >= 0;
    const sorted = [...state.stocks].sort((a,b) => new Date(b.date)-new Date(a.date));

    html += `
      <div class="stock-gradient rounded-3xl p-5 text-white shadow-lg shadow-blue-300/30 relative overflow-hidden">
        <div class="relative z-10 flex justify-between items-start mb-4">
          <div>
            <div class="w-9 h-9 bg-white/20 rounded-xl flex items-center justify-center text-lg mb-3">📈</div>
            <p class="text-xs font-semibold text-white/80 mb-1">มูลค่าสินทรัพย์รวม (THB)</p>

function renderSummary(container) {
  let first = '9999-99', last = '0000-00';
  if (state.installments.length > 0) {
    state.installments.forEach(i => {
      if (i.startMonth < first) first = i.startMonth;
      const end = shiftMonthStr(i.startMonth, i.dur - 1);
      if (end > last) last = end;
    });
  }
  const stats = [];
  if (first !== '9999-99') {
    let cur = first;
    while (cur <= last && stats.length < 36) {
      let s = 0;
      state.installments.forEach(i => {
        const e = shiftMonthStr(i.startMonth, i.dur - 1);
        if (cur >= i.startMonth && cur <= e) s += i.amount;
      });
      stats.push({ ym: cur, total: s });
      cur = shiftMonthStr(cur, 1);
    }
  }

  const today = new Date();
  const thisYm = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const thisMonth = stats.find(s => s.ym === thisYm);
  const maxMonth  = stats.reduce((mx, s) => s.total > mx.total ? s : mx, { total: 0 });
  const totalBurden = stats.reduce((s, r) => s + r.total, 0);

  container.innerHTML = `
    <div class="space-y-4 fade-in">
      <div class="section-head"><h2>วิเคราะห์การเงิน</h2></div>

      ${stats.length > 0 ? `
        <!-- KPI row -->
        <div class="grid grid-cols-3 gap-3">
          <div class="item-card p-4 text-center">
            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1">เดือนนี้</p>
            <p class="text-base font-black text-theme-primary">฿${toCurr(thisMonth?.total||0)}</p>
          </div>
          <div class="item-card p-4 text-center">
            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1">สูงสุด</p>
            <p class="text-base font-black text-rose-500">฿${toCurr(maxMonth.total)}</p>
          </div>
          <div class="item-card p-4 text-center">
            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1">รวมทั้งหมด</p>
            <p class="text-base font-black text-slate-800">฿${toCurr(totalBurden)}</p>
          </div>
        </div>

        <!-- Chart -->
        <div class="item-card p-5">
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">แผนภูมิภาระผ่อน</p>
          <div style="height:180px"><canvas id="sumChart"></canvas></div>
        </div>

        <!-- Table -->
        <div class="item-card overflow-hidden">
          <div class="px-5 py-3 bg-slate-50 border-b border-slate-100 flex justify-between text-[9px] font-bold text-slate-400 uppercase tracking-widest">
            <span>เดือน</span><span>ยอดผ่อนรวม</span>
          </div>
          ${stats.map(s => {
            const isCurrent = s.ym === thisYm;
            return `
              <div class="summary-row ${isCurrent ? 'bg-theme-primary/5' : 'hover:bg-slate-50'} transition-colors">
                <div class="flex items-center gap-2">
                  ${isCurrent ? '<div class="w-2 h-2 bg-theme-primary rounded-full"></div>' : '<div class="w-2 h-2"></div>'}
                  <p class="text-sm font-${isCurrent?'black':'bold'} text-slate-${isCurrent?'800':'600'}">${formatThaiMonth(s.ym)}</p>
                </div>
                <p class="text-sm font-black text-${isCurrent?'theme-primary':'slate-700'}">฿${toCurr(s.total)}</p>
              </div>`;
          }).join('')}
        </div>
      ` : `<div class="empty-state"><i class="fa-solid fa-chart-bar"></i><p>ยังไม่มีข้อมูลให้วิเคราะห์ค่ะ<br>ลองเพิ่มรายการผ่อนก่อนนะคะ</p></div>`}

      <!-- AI button -->
      <button onclick="askAIAdvisor()" class="w-full py-4 ai-gradient text-white rounded-3xl font-bold flex items-center justify-center gap-3 relative overflow-hidden active:scale-95 transition-transform shadow-lg shadow-indigo-200">
        <div class="absolute inset-0 shimmer"></div>
        <i class="fa-solid fa-wand-magic-sparkles relative z-10"></i>
        <span class="relative z-10">ให้ AI เก๋ ช่วยวิเคราะห์การเงิน</span>
      </button>
    </div>`;

  if (stats.length > 0) {
    setTimeout(() => {
      const canvas = document.getElementById('sumChart'); if (!canvas) return;
      if (chartInstance) chartInstance.destroy();
      const color = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
      chartInstance = new Chart(canvas.getContext('2d'), {
        type: 'bar',
        data: {
          labels: stats.map(s => { const [y,m]=s.ym.split('-'); return ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][parseInt(m)-1]+' '+y.slice(2); }),
          datasets: [{
            data: stats.map(s => s.total),
            backgroundColor: stats.map(s => s.ym === thisYm ? color : color+'60'),
            borderRadius: 8, barThickness: 14
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { display: false, beginAtZero: true },
            x: { grid: { display: false }, ticks: { font: { family:'Kanit', size:9 }, color:'#94a3b8' }, border: { display: false } }
          },
          animation: { duration: 800, easing: 'easeOutQuart' }
        }
      });
    }, 80);
  }
}

/* ═══════════════════════════════════════════
   AI ADVISOR
═══════════════════════════════════════════ */
async function fetchGeminiAPI(prompt, expectJson = false) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
  const payload = {
    contents: [{ parts: [{ text: prompt }] }],
    systemInstruction: { parts: [{ text: "You are 'Kae' (เก๋), a friendly expert Thai financial advisor in an app named Meetang. Reply briefly in Thai. Use emojis. Call the user 'เบนซ์'. No health/medical advice." }] }
  };
  if (expectJson) payload.generationConfig = { responseMimeType: 'application/json' };
  try {
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error();
    const d = await res.json();
    return expectJson ? JSON.parse(d.candidates[0].content.parts[0].text) : d.candidates[0].content.parts[0].text;
  } catch { return null; }
}

window.askAIAdvisor = async () => {
  openModal('AI เก๋ กำลังวิเคราะห์...', `<div class="flex flex-col items-center py-8 gap-3"><i class="fa-solid fa-circle-notch fa-spin text-3xl text-theme-primary"></i><p class="text-xs font-bold text-slate-400 uppercase tracking-widest animate-pulse">กำลังคิด...</p></div>`);
  const today = new Date();
  const thisYm = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const monthTotal = state.installments.reduce((s, i) => {
    const end = shiftMonthStr(i.startMonth, i.dur - 1);
    return (thisYm >= i.startMonth && thisYm <= end) ? s + i.amount : s;
  }, 0);
  const prompt = `ฉันมีภาระผ่อนรายเดือน ฿${toCurr(monthTotal)} บาท จากรายการผ่อน ${state.installments.length} รายการ, บัตรเครดิต ${state.cards.length} ใบ, พอร์ตหุ้น ${state.stocks.length} รายการ, และทองคำ ${state.gold.length} รายการ ช่วยวิเคราะห์สภาพการเงินและให้คำแนะนำสั้น ๆ หน่อยนะคะ`;
  const reply = await fetchGeminiAPI(prompt);
  openModal('คำแนะนำจาก AI เก๋ ✨', `
    <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100 mb-4">
      <p class="text-sm font-semibold text-slate-700 leading-relaxed">${reply || 'ขออภัย ไม่สามารถเชื่อมต่อได้ในขณะนี้ค่ะ กรุณาตรวจสอบ API Key ด้วยนะคะ'}</p>

};

/* ═══════════════════════════════════════════
   DATA MANAGEMENT
═══════════════════════════════════════════ */
function arrayToCSV(arr) {
  if (arr.length === 0) return '';
  const keys = Object.keys(arr[0]);
  return [keys.join(','), ...arr.map(obj => keys.map(k => `"${(obj[k]||'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');
}

window.exportData = async () => {
  if (typeof JSZip === 'undefined') return alert('กำลังโหลด JSZip กรุณาลองใหม่อีกครั้งค่ะ');
  const zip = new JSZip();
  zip.file('meetang_system_data.json', JSON.stringify({ cards:state.cards, installments:state.installments, gold:state.gold, stocks:state.stocks, marketPrices:state.marketPrices, theme:state.theme, settings:state.settings, lastBackup:state.lastBackup }, null, 2));
  const csv = zip.folder('excel_files');
  if (state.cards.length)        csv.file('cards.csv',        '\ufeff'+arrayToCSV(state.cards));
  if (state.installments.length) csv.file('installments.csv', '\ufeff'+arrayToCSV(state.installments));
  if (state.gold.length)         csv.file('gold.csv',         '\ufeff'+arrayToCSV(state.gold));
  if (state.stocks.length)       csv.file('stocks.csv',       '\ufeff'+arrayToCSV(state.stocks));
  const blob = await zip.generateAsync({ type:'blob' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `meetang_backup_${new Date().toISOString().slice(0,10)}.zip`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  state.lastBackup = 'เซฟ Zip เมื่อ ' + new Date().toLocaleString('th-TH', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  forceSave(); if (state.tab === 'home') renderViewport();
};

window.importData = (e) => {
  const file = e.target.files[0]; if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'zip') {
    if (typeof JSZip === 'undefined') return alert('โหลดไลบรารีไม่สำเร็จค่ะ');
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const zip  = await JSZip.loadAsync(ev.target.result);
        if (!zip.file('meetang_system_data.json')) return alert('ไม่พบไฟล์ข้อมูลค่ะ');
        restoreFromJson(await zip.file('meetang_system_data.json').async('string'));
      } catch { alert('เกิดข้อผิดพลาดในการแตกไฟล์ค่ะ'); }
    };
    reader.readAsArrayBuffer(file);
  } else {
    const reader = new FileReader();
    reader.onload = (ev) => restoreFromJson(ev.target.result);
    reader.readAsText(file);
  }
  e.target.value = '';
};

function restoreFromJson(json) {
  try {
    const p = JSON.parse(json);
    if (p.cards !== undefined) {
      state.cards=p.cards||[]; state.installments=p.installments||[]; state.gold=p.gold||[]; state.stocks=p.stocks||[]; state.marketPrices=p.marketPrices||{};
      if (p.theme) state.theme=p.theme;
      if (p.settings) { state.settings=p.settings; if (!state.settings.usdRate) state.settings.usdRate=36.5; }
      state.lastBackup = 'โหลดเมื่อ '+new Date().toLocaleString('th-TH',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
      forceSave(); applyTheme(state.theme.color); renderViewport(); closeModal();
      alert('กู้คืนข้อมูลสำเร็จแล้วค่ะ! 🎉');
    } else { alert('ไฟล์ไม่ถูกต้องค่ะ'); }
  } catch { alert('เกิดข้อผิดพลาดในการอ่านไฟล์ค่ะ'); }
}

window.clearAllData = () => {
  if (confirm('⚠️ แน่ใจนะคะว่าจะล้างข้อมูลทั้งหมด? (แนะนำให้ Backup ก่อนค่ะ)')) {
    if (confirm('ยืนยันการลบจริง ๆ? กู้คืนไม่ได้นะคะ')) {
      state.cards=[]; state.installments=[]; state.gold=[]; state.stocks=[]; state.marketPrices={}; state.lastBackup='';
      forceSave(); closeModal(); renderViewport();
      alert('เคลียร์ข้อมูลเรียบร้อยแล้วค่ะ ✨');
    }
  }
};

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
window.onload = run;
</script>
